[package]
name = "mycelix-energy-leptos"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Energy — Leptos CSR frontend"

[dependencies]
leptos = { version = "0.8", features = ["csr"] }
leptos_router = { version = "0.8" }
leptos_meta = { version = "0.8" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["console", "Window", "HtmlInputElement"] }
gloo-timers = { version = "0.3", features = ["futures"] }
console_error_panic_hook = "0.1"
js-sys = "0.3"

# Mycelix shared
mycelix-leptos-core = { path = "../../../crates/mycelix-leptos-core" }
mycelix-leptos-client = { path = "../../../crates/mycelix-leptos-client" }
mycelix-leptos-i18n = { path = "../../../crates/mycelix-leptos-i18n" }
energy-leptos-types = { path = "../../crates/energy-leptos-types" }
mycelix-mock-data = { path = "../../../crates/mycelix-mock-data" }

[workspace]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
