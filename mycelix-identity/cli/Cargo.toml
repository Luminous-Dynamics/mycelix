[package]
name = "mycelix-identity-cli"
version = "0.1.0"
edition = "2021"
description = "Legacy Bridge CLI for importing institutional academic credentials"
authors = ["Luminous Dynamics <contact@luminousdynamics.org>"]
license = "AGPL-3.0-or-later"

[workspace]
# This crate is not part of the Holochain WASM workspace

[[bin]]
name = "mycelix-credential"
path = "src/main.rs"

[dependencies]
# CLI framework
clap = { version = "4.4", features = ["derive"] }

# Async runtime
tokio = { version = "1.35", features = ["full"] }

# CSV parsing
csv = "1.3"

# JSON handling
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography
sha2 = "0.10"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
rand = "0.8"
base64 = "0.21"

# PQC crypto (keygen, sign, verify for all algorithms)
mycelix-crypto = { path = "../crates/mycelix-crypto", features = ["native"] }

# DNS resolution with DNSSEC
trust-dns-resolver = { version = "0.23", features = ["dnssec-ring"] }

# Date/time handling
chrono = { version = "0.4", features = ["serde"] }

# UUID generation
uuid = { version = "1.6", features = ["v4"] }

# Secret key zeroization
zeroize = { version = "1", features = ["derive"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Progress bars and console output
indicatif = "0.17"
console = "0.15"

# HTTP client for Holochain conductor
reqwest = { version = "0.11", features = ["json"] }

# Hex encoding
hex = "0.4"

[dev-dependencies]
tempfile = "3.9"
