[package]
name = "mycelix-eidas-zkp"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "eIDAS 2.0 compliant ZKP selective disclosure for EUDI Wallet"
authors = ["Tristan Stoltz <tristan.stoltz@evolvingresonantcocreationism.com>"]
keywords = ["eidas", "verifiable-credentials", "zkp", "selective-disclosure", "dilithium"]

[[bin]]
name = "eidas_demo"
path = "src/bin/eidas_demo.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
time = { version = "0.3", features = ["formatting", "parsing"] }
