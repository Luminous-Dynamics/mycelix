---
manifest_version: "0"
name: mycelix_identity_dna

integrity:
  network_seed: "mycelix-identity-v1"
  zomes:
    - name: did_registry_integrity
      path: "../target/wasm32-unknown-unknown/release/did_registry_integrity.wasm"

    - name: credential_schema_integrity
      path: "../target/wasm32-unknown-unknown/release/credential_schema_integrity.wasm"

    - name: revocation_integrity
      path: "../target/wasm32-unknown-unknown/release/revocation_integrity.wasm"

    - name: recovery_integrity
      path: "../target/wasm32-unknown-unknown/release/recovery_integrity.wasm"

    - name: identity_bridge_integrity
      path: "../target/wasm32-unknown-unknown/release/identity_bridge_integrity.wasm"

    - name: trust_credential_integrity
      path: "../target/wasm32-unknown-unknown/release/trust_credential_integrity.wasm"

    - name: verifiable_credential_integrity
      path: "../target/wasm32-unknown-unknown/release/verifiable_credential_integrity.wasm"

    - name: education_integrity
      path: "../target/wasm32-unknown-unknown/release/education_integrity.wasm"

    - name: mfa_integrity
      path: "../target/wasm32-unknown-unknown/release/mfa_integrity.wasm"

    - name: name_registry_integrity
      path: "../target/wasm32-unknown-unknown/release/name_registry_integrity.wasm"

    - name: web_of_trust_integrity
      path: "../target/wasm32-unknown-unknown/release/web_of_trust_integrity.wasm"

    - name: reputation_aggregator_integrity
      path: "../target/wasm32-unknown-unknown/release/reputation_aggregator_integrity.wasm"

coordinator:
  zomes:
    - name: did_registry
      path: "../target/wasm32-unknown-unknown/release/did_registry.wasm"
      dependencies:
        - name: did_registry_integrity
        - name: recovery_integrity

    - name: credential_schema
      path: "../target/wasm32-unknown-unknown/release/credential_schema.wasm"
      dependencies:
        - name: credential_schema_integrity

    - name: revocation
      path: "../target/wasm32-unknown-unknown/release/revocation.wasm"
      dependencies:
        - name: revocation_integrity

    - name: recovery
      path: "../target/wasm32-unknown-unknown/release/recovery.wasm"
      dependencies:
        - name: recovery_integrity
        - name: did_registry_integrity
        - name: identity_bridge_integrity
        - name: mfa_integrity

    - name: identity_bridge
      path: "../target/wasm32-unknown-unknown/release/identity_bridge.wasm"
      dependencies:
        - name: identity_bridge_integrity
        - name: did_registry_integrity
        - name: verifiable_credential_integrity
        - name: mfa_integrity
        - name: trust_credential_integrity

    - name: trust_credential
      path: "../target/wasm32-unknown-unknown/release/trust_credential_coordinator.wasm"
      dependencies:
        - name: trust_credential_integrity
        - name: did_registry_integrity

    - name: verifiable_credential
      path: "../target/wasm32-unknown-unknown/release/verifiable_credential_coordinator.wasm"
      dependencies:
        - name: verifiable_credential_integrity
        - name: did_registry_integrity
        - name: credential_schema_integrity
        - name: revocation_integrity

    - name: education
      path: "../target/wasm32-unknown-unknown/release/education_coordinator.wasm"
      dependencies:
        - name: education_integrity

    - name: mfa
      path: "../target/wasm32-unknown-unknown/release/mfa_coordinator.wasm"
      dependencies:
        - name: mfa_integrity
        - name: did_registry_integrity

    - name: name_registry
      path: "../target/wasm32-unknown-unknown/release/name_registry_coordinator.wasm"
      dependencies:
        - name: name_registry_integrity

    - name: web_of_trust
      path: "../target/wasm32-unknown-unknown/release/web_of_trust_coordinator.wasm"
      dependencies:
        - name: web_of_trust_integrity

    - name: reputation_aggregator
      path: "../target/wasm32-unknown-unknown/release/reputation_aggregator.wasm"
      dependencies:
        - name: reputation_aggregator_integrity
        - name: web_of_trust_integrity
