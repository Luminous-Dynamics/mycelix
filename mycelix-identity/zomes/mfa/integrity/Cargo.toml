[package]
name = "mfa_integrity"
version = "0.1.0"
edition = "2021"
description = "Multi-Factor Authentication integrity zome for MFDI spec"

[lib]
crate-type = ["cdylib", "rlib"]
name = "mfa_integrity"

[dependencies]
hdi.workspace = true
serde.workspace = true
serde_json.workspace = true
holochain_serialized_bytes.workspace = true

[dev-dependencies]
proptest = "1"

[features]
default = []
