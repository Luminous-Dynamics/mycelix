[package]
name = "mycelix-hearth-ui"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Hearth + Personal: Living digital symbiote (Leptos + Bevy)"

[workspace]

[dependencies]
# Leptos framework
leptos = { version = "0.8", features = ["csr"] }
leptos_router = "0.8"
leptos_meta = "0.8"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"

# WASM bindings
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"

# Web APIs
web-sys = { version = "0.3", features = [
    "console",
    "Window",
    "Document",
    "Navigator",
    "Storage",
    "Location",
    "Performance",
    "HtmlCanvasElement",
    "CanvasRenderingContext2d",
    "HtmlInputElement",
    "HtmlTextAreaElement",
    "HtmlSelectElement",
    "EventTarget",
    "CssStyleDeclaration",
    "HtmlElement",
    "MouseEvent",
    "DomRect",
    "Element",
    # Battery Status API (graceful fallback if unavailable)
    "BatteryManager",
] }

# Utilities
console_error_panic_hook = "0.1"
gloo-timers = { version = "0.3", features = ["futures"] }
send_wrapper = "0.6"

# WASM-safe mirror types (NO hdi dependencies)
hearth-leptos-types = { path = "../../crates/hearth-leptos-types" }
personal-leptos-types = { path = "../../../mycelix-personal/crates/personal-leptos-types" }

# Mycelix shared Leptos infrastructure
mycelix-leptos-core = { path = "../../../crates/mycelix-leptos-core" }
mycelix-leptos-client = { path = "../../../crates/mycelix-leptos-client", features = ["browser"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
