[package]
name = "hearth-tests"
version = "0.1.0"
edition = "2021"
description = "Integration tests for mycelix-hearth cluster hApp"
publish = false
autotests = false

[features]
# Enable to run consciousness_gating tests that need the identity bridge DNA.
# Without this, those tests are cfg-gated out (fallback credential bypasses rejection).
identity_cluster = []

[lib]
path = "lib.rs"

[dependencies]
holochain = { version = "0.6", features = ["test_utils", "sweettest"] }
holochain_types = "0.6"
hdk = "0.6"
hdi = "0.7"
tokio = { version = "1", features = ["full", "test-util"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"

[[test]]
name = "sweettest_kinship"
path = "sweettest_kinship.rs"

[[test]]
name = "sweettest_decisions_kinship"
path = "sweettest_decisions_kinship.rs"

[[test]]
name = "sweettest_bridge"
path = "sweettest_bridge.rs"

[[test]]
name = "sweettest_digest_sync"
path = "sweettest_digest_sync.rs"

[[test]]
name = "sweettest_consciousness_gating"
path = "sweettest_consciousness_gating.rs"

[[test]]
name = "sweettest_care_gratitude_rhythms"
path = "sweettest_care_gratitude_rhythms.rs"

[[test]]
name = "sweettest_emergency"
path = "sweettest_emergency.rs"

[[test]]
name = "sweettest_autonomy"
path = "sweettest_autonomy.rs"

[[test]]
name = "sweettest_multi_hearth"
path = "sweettest_multi_hearth.rs"

[[test]]
name = "sweettest_resources"
path = "sweettest_resources.rs"

[[test]]
name = "sweettest_milestones"
path = "sweettest_milestones.rs"

[[test]]
name = "sweettest_stories"
path = "sweettest_stories.rs"
