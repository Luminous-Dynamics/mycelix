[build]
target = "index.html"
dist = "dist"

[[hooks]]
stage = "post_build"
command = "sh"
command_arguments = ["-c", "for f in dist/*.wasm; do wasm-opt -Oz --zero-filled-memory --enable-bulk-memory \"$f\" -o \"$f\" 2>/dev/null || true; done; cp -r static/* dist/ 2>/dev/null; true"]

[watch]
watch = ["src", "style", "index.html"]

[serve]
port = 8109
open = false
