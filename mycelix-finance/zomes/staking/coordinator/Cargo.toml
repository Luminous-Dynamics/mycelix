[package]
name = "staking_coordinator"
version = "0.1.0"
edition = "2021"
description = "Tri-asset staking coordinator zome with cryptographic proofs"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
hdk = { workspace = true }
staking_integrity = { path = "../integrity" }
mycelix_finance_shared = { path = "../../shared" }
holochain_serialized_bytes = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
mycelix_finance_types = { path = "../../../types" }
blake2b_simd = "1.0"

[features]
default = []
