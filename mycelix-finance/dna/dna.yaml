---
# Mycelix Finance DNA — Three-Currency Model
# SAP (circulation), TEND (mutual credit), MYCEL (reputation via recognition)

manifest_version: "0"
name: mycelix_finance
integrity:
  network_seed: ~
  properties:
    # Demurrage configuration
    demurrage_rate: 0.02           # 2% annual (constitutional bounds: 1-5%)
    exempt_floor: 1000             # SAP exempt from demurrage per member
    inalienable_reserve_ratio: 0.25 # Constitutional minimum 25%

    # TEND configuration
    tend_base_limit: 40            # ±40 hours (adjustable 20-80 by governance)
    tend_apprentice_limit: 10      # ±10 hours for apprentices

    # Recognition configuration
    max_recognitions_per_cycle: 10
    recognition_base_weight: 1.0

    # MYCEL thresholds
    mycel_apprentice_max: 0.3      # Graduate above this
    mycel_steward_min: 0.7         # Steward tier above this

    # Collateral bridge
    min_mycel_for_bridge: 0.3      # Minimum MYCEL to mint/redeem SAP
    max_vault_daily_pct: 0.05      # Max 5% of vault per day per member

  zomes:
    - name: payments_integrity
      path: ../target/wasm32-unknown-unknown/release/payments_integrity.wasm
    - name: treasury_integrity
      path: ../target/wasm32-unknown-unknown/release/treasury_integrity.wasm
    - name: finance_bridge_integrity
      path: ../target/wasm32-unknown-unknown/release/finance_bridge_integrity.wasm
    - name: staking_integrity
      path: ../target/wasm32-unknown-unknown/release/staking_integrity.wasm
    - name: tend_integrity
      path: ../target/wasm32-unknown-unknown/release/tend_integrity.wasm
    - name: recognition_integrity
      path: ../target/wasm32-unknown-unknown/release/recognition_integrity.wasm
    - name: currency_mint_integrity
      path: ../target/wasm32-unknown-unknown/release/currency_mint_integrity.wasm
    - name: price_oracle_integrity
      path: ../target/wasm32-unknown-unknown/release/price_oracle_integrity.wasm

coordinator:
  zomes:
    - name: payments
      path: ../target/wasm32-unknown-unknown/release/payments.wasm
      dependencies:
        - name: payments_integrity
        - name: recognition_integrity
        - name: tend_integrity
    - name: treasury
      path: ../target/wasm32-unknown-unknown/release/treasury.wasm
      dependencies:
        - name: treasury_integrity
        - name: payments_integrity
    - name: finance_bridge
      path: ../target/wasm32-unknown-unknown/release/finance_bridge.wasm
      dependencies:
        - name: finance_bridge_integrity
    - name: staking
      path: ../target/wasm32-unknown-unknown/release/staking_coordinator.wasm
      dependencies:
        - name: staking_integrity
    - name: tend
      path: ../target/wasm32-unknown-unknown/release/tend.wasm
      dependencies:
        - name: tend_integrity
    - name: recognition
      path: ../target/wasm32-unknown-unknown/release/recognition.wasm
      dependencies:
        - name: recognition_integrity
    - name: currency_mint
      path: ../target/wasm32-unknown-unknown/release/currency_mint.wasm
      dependencies:
        - name: currency_mint_integrity
        - name: tend_integrity
        - name: finance_bridge_integrity
    - name: price_oracle
      path: ../target/wasm32-unknown-unknown/release/price_oracle.wasm
      dependencies:
        - name: price_oracle_integrity
        - name: tend_integrity
