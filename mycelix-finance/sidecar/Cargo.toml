[package]
name = "mycelix-fiat-bridge"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Stripe webhook → mycelix-finance Holochain bridge sidecar"

[dependencies]
# Web framework
axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Stripe signature verification
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Unique IDs
uuid = { version = "1", features = ["v4"] }

# This crate lives under a larger workspace tree but is intentionally standalone.
# Declaring an empty workspace prevents Cargo from trying to treat it as part of
# /mycelix-finance's workspace when running commands from this directory.
[workspace]
