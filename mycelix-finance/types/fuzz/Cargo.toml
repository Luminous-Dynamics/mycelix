[package]
name = "mycelix_finance_types-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.mycelix_finance_types]
path = ".."

[[bin]]
name = "fuzz_demurrage"
path = "fuzz_targets/fuzz_target_1.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_currency_params"
path = "fuzz_targets/fuzz_currency_params.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_minted_demurrage"
path = "fuzz_targets/fuzz_minted_demurrage.rs"
test = false
doc = false
bench = false
