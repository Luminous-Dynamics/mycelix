version: '3.8'

# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  web:
    build:
      args:
        - NODE_ENV=production
    environment:
      - NODE_ENV=production
    # In production, typically use a reverse proxy (nginx/traefik)
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.edunet.rule=Host(`edunet.example.com`)"
    #   - "traefik.http.routers.edunet.tls.certresolver=letsencrypt"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

