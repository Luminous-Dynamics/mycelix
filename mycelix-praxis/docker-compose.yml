version: '3.8'

services:
  # Web client (React + Vite)
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - HOLOCHAIN_ADMIN_URL=ws://conductor:8888
      - HOLOCHAIN_APP_URL=ws://conductor:8889
    restart: unless-stopped
    depends_on:
      conductor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - edunet

  # Holochain conductor (v0.6)
  conductor:
    build:
      context: .
      dockerfile: docker/Dockerfile.conductor
    ports:
      - "8888:8888"  # Admin interface
      - "8889:8889"  # App interface
    volumes:
      - conductor_data:/data
      - ./conductor/dev-conductor-config.yaml:/app/conductor-config.yaml:ro
      - ./happ/mycelix-edunet.happ:/app/mycelix-edunet.happ:ro
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "holochain", "--version"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - edunet

networks:
  edunet:
    driver: bridge

volumes:
  conductor_data:
    driver: local
