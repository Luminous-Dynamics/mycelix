---
# Mycelix Ecosystem - Unified Conductor Configuration
# This conductor runs all Mycelix DNAs in a single instance
# Recommended for production deployment

# Keystore configuration (shared across all apps)
keystore:
  type: lair_server_in_proc
  lair_root: null  # Use default ~/.local/share/lair

# Database directory for all apps
environment_path: ./conductor/databases

# Network configuration (shared DHT)
network:
  bootstrap_service: "https://bootstrap.holo.host"
  transport_pool:
    - type: quic
      bind_to: "kitsune-quic://0.0.0.0:0"
  tuning_params:
    gossip_loop_iteration_delay_ms: 10
    default_rpc_single_timeout_ms: 30000
    default_rpc_multi_remote_agent_count: 3
    default_notify_timeout_ms: 30000
    default_notify_remote_agent_count: 3
    gossip_inbound_target_mbps: 100
    gossip_outbound_target_mbps: 100
    gossip_historic_outbound_target_mbps: 100
    gossip_historic_inbound_target_mbps: 100

# Single admin interface for all Mycelix apps
admin_interfaces:
  - driver:
      type: websocket
      port: 4444

# Single app interface for all Mycelix apps
app_interfaces:
  - driver:
      type: websocket
      port: 8888
      allowed_origins: "*"

# Note: Install multiple apps via admin interface
# hc app install --app-id mycelix-edunet --bundle edunet.dna
# hc app install --app-id mycelix-fl --bundle fl.dna
# hc app install --app-id mycelix-core --bundle core.dna
