[package]
name = "mycelix-praxis-ui"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Leptos CSR frontend for Mycelix Praxis — pilot for ecosystem-wide Leptos migration"

[dependencies]
leptos = { version = "0.8", features = ["csr"] }
leptos_router = "0.8"
leptos_meta = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console", "HtmlSelectElement", "HtmlInputElement", "HtmlTextAreaElement", "EventTarget", "Window", "Navigator", "Clipboard", "Location", "Storage", "MediaQueryList", "Blob", "BlobPropertyBag", "Url", "HtmlElement", "Document", "Element", "FileReader", "File", "FileList", "HtmlAnchorElement", "Worker", "MessageEvent", "ErrorEvent", "IdbFactory", "IdbDatabase", "IdbObjectStore", "IdbObjectStoreParameters", "IdbRequest", "IdbTransaction", "IdbTransactionMode", "IdbOpenDbRequest", "DomStringList"] }
console_error_panic_hook = "0.1"
gloo-timers = { version = "0.3", features = ["futures"] }

# Shared types from the praxis backend
praxis-core = { path = "../../crates/praxis-core", default-features = false }

# Shared Holochain client + UI components for Leptos apps
mycelix-leptos-client = { path = "../../../crates/mycelix-leptos-client", features = ["browser"] }
mycelix-leptos-core = { path = "../../../crates/mycelix-leptos-core" }
send_wrapper = "0.6"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
