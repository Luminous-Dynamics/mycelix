[build]
target = "index.html"
dist = "dist"

# Optimize WASM and copy curriculum content into dist/ after each build
[[hooks]]
stage = "post_build"
command = "sh"
command_arguments = ["-c", "for f in dist/*.wasm; do wasm-opt -Oz --zero-filled-memory --enable-bulk-memory \"$f\" -o \"$f\" 2>/dev/null || true; done; mkdir -p dist/caps && cp -r ../../examples/curriculum/caps/generated dist/caps/ 2>/dev/null; cp -r static/* dist/ 2>/dev/null; true"]

[watch]
watch = ["src", "style", "index.html"]

[serve]
port = 3001
open = false
