[package]
name = "mycelix-praxis-desktop"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Tauri v2 native client for Praxis — wraps Leptos frontend with Holochain conductor"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

# Consciousness engine (optional — enables real sensor data instead of simulation)
# symthaea-soma = { path = "../../../../symthaea/crates/symthaea-soma", optional = true }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
# Enable when Soma crate dependencies are resolved for desktop target:
# consciousness = ["dep:symthaea-soma"]
