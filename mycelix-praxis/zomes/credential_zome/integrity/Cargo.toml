[package]
name = "credential_integrity"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Credential integrity zome - defines entry types and validation for W3C Verifiable Credentials"

[lib]
crate-type = ["cdylib", "rlib"]
name = "credential_integrity"

[dependencies]
# Holochain Integrity (HDI) for entry definitions
hdi.workspace = true

# Core types
praxis-core = { path = "../../../crates/praxis-core" }

# Serialization
serde.workspace = true
serde_json.workspace = true
holochain_serialized_bytes.workspace = true
chrono.workspace = true
# Note: Epistemic levels stored as u8 for HDI compatibility
# The coordinator imports mycelix-sdk for the actual enum types
