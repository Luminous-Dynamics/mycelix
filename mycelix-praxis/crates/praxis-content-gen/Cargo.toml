[package]
name = "edunet-content-gen"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "AI-assisted educational content generation pipeline for EduNet"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
