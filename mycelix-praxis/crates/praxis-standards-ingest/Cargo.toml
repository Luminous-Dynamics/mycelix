[package]
name = "edunet-standards-ingest"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "CLI tool to fetch K-12 standards from the Common Standards Project API and output EduNet curriculum JSON"

[[bin]]
name = "edunet-standards-ingest"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
thiserror = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
edunet-content-gen = { path = "../edunet-content-gen" }
