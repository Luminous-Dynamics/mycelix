<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matric Math & Science Explorer — CAPS Curriculum</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4ea; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 380px; background: #181b23; border-right: 1px solid #2a2d38; display: flex; flex-direction: column; overflow: hidden; }
  #sidebar-header { padding: 16px 20px; border-bottom: 1px solid #2a2d38; }
  #sidebar-header h1 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  #sidebar-header p { font-size: 12px; color: #8b8fa3; }
  #filters { padding: 12px 20px; border-bottom: 1px solid #2a2d38; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 12px; border-radius: 14px; border: 1px solid #3a3d48; background: transparent; color: #b0b4c3; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .filter-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
  .filter-btn:hover { border-color: #5a5d68; }
  #node-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
  .node-item { padding: 10px 12px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; }
  .node-item:hover { background: #1f222d; }
  .node-item.selected { background: #1a2340; border-left-color: #2563eb; }
  .node-item .title { font-size: 13px; font-weight: 600; color: #d1d5e0; }
  .node-item .meta { font-size: 11px; color: #6b7085; margin-top: 2px; }
  .node-item .grade-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; margin-right: 4px; }
  .gr10 { background: #1a3a2a; color: #4ade80; }
  .gr11 { background: #2a2a1a; color: #facc15; }
  .gr12 { background: #3a1a1a; color: #f87171; }
  .math { border-left-color: #3b82f6 !important; }
  .physics { border-left-color: #22c55e !important; }

  /* Main content */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #graph-container { flex: 1; position: relative; overflow: hidden; }
  #graph-container canvas { position: absolute; top: 0; left: 0; }
  #graph-info { position: absolute; top: 12px; right: 12px; background: rgba(24,27,35,0.9); border: 1px solid #2a2d38; border-radius: 8px; padding: 8px 12px; font-size: 11px; color: #8b8fa3; }

  /* Detail panel */
  #detail { height: 50%; border-top: 1px solid #2a2d38; background: #181b23; overflow-y: auto; display: none; }
  #detail.open { display: block; }
  #detail-header { padding: 16px 24px 12px; border-bottom: 1px solid #2a2d38; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #181b23; z-index: 2; }
  #detail-header h2 { font-size: 16px; font-weight: 700; color: #fff; }
  #detail-close { background: none; border: none; color: #8b8fa3; font-size: 20px; cursor: pointer; padding: 4px 8px; }
  #detail-close:hover { color: #fff; }
  #detail-body { padding: 16px 24px; }

  .section { margin-bottom: 20px; }
  .section h3 { font-size: 13px; font-weight: 700; color: #8b8fa3; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .section p, .section li { font-size: 14px; line-height: 1.6; color: #c8ccd6; }
  .section ul { padding-left: 20px; }

  .example-card { background: #1f222d; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
  .example-card .problem { font-weight: 600; color: #e1e4ea; margin-bottom: 8px; }
  .example-card .step { font-size: 13px; color: #a0a4b4; margin: 3px 0; padding-left: 12px; border-left: 2px solid #2a2d38; }
  .example-card .answer { font-weight: 600; color: #4ade80; margin-top: 8px; }

  .problem-card { background: #1f222d; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .problem-card .q { font-weight: 500; color: #d1d5e0; }
  .problem-card .a { color: #4ade80; font-size: 13px; margin-top: 4px; }
  .problem-card .diff { font-size: 11px; color: #6b7085; }

  .flashcard { display: flex; gap: 12px; background: #1f222d; border-radius: 8px; padding: 12px; margin-bottom: 6px; cursor: pointer; }
  .flashcard .front { flex: 1; font-size: 13px; color: #d1d5e0; }
  .flashcard .back { flex: 1; font-size: 13px; color: #4ade80; filter: blur(4px); transition: filter 0.3s; }
  .flashcard:hover .back { filter: none; }

  .resource-link { display: inline-block; padding: 4px 10px; margin: 3px; border-radius: 4px; font-size: 12px; text-decoration: none; color: #93c5fd; border: 1px solid #2a3a5a; transition: all 0.15s; }
  .resource-link:hover { background: #1a2a4a; border-color: #3b82f6; }

  .misconception { background: #2a1a1a; border: 1px solid #5a2a2a; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .misconception .wrong { color: #f87171; font-weight: 600; }
  .misconception .right { color: #4ade80; font-weight: 600; }
  .misconception .why { color: #a0a4b4; font-style: italic; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 16px; background: #12141b; border-radius: 8px; padding: 3px; }
  .tab { flex: 1; padding: 7px 12px; text-align: center; font-size: 12px; font-weight: 600; border-radius: 6px; cursor: pointer; color: #6b7085; transition: all 0.15s; }
  .tab.active { background: #2563eb; color: #fff; }
  .tab:hover:not(.active) { color: #b0b4c3; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2d38; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3d48; }

  /* Search */
  #search { width: 100%; padding: 8px 12px; background: #12141b; border: 1px solid #2a2d38; border-radius: 6px; color: #e1e4ea; font-size: 13px; outline: none; margin-top: 8px; }
  #search:focus { border-color: #2563eb; }
  #search::placeholder { color: #4a4d58; }

  /* Progress */
  #progress-bar { padding: 10px 20px; border-bottom: 1px solid #2a2d38; }
  .progress-track { height: 6px; background: #1f222d; border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .progress-fill.mastered { background: #22c55e; }
  .progress-fill.studying { background: #facc15; }
  .progress-stats { font-size: 11px; color: #6b7085; display: flex; gap: 12px; margin-top: 4px; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }
  .status-btns { display: flex; gap: 6px; margin-bottom: 12px; }
  .status-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid #2a2d38; background: transparent; color: #8b8fa3; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .status-btn.active { font-weight: 700; }
  .status-btn[data-status="not-started"].active { border-color: #4a4d58; color: #b0b4c3; }
  .status-btn[data-status="studying"].active { border-color: #facc15; color: #facc15; background: rgba(250,204,21,0.1); }
  .status-btn[data-status="mastered"].active { border-color: #22c55e; color: #22c55e; background: rgba(34,197,94,0.1); }
  .node-item .status-icon { font-size: 10px; float: right; margin-top: 2px; }
  .exam-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; background: #2a1a3a; color: #c084fc; margin-left: 8px; }

  /* Study Schedule */
  #schedule-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 600px; max-height: 80vh; background: #181b23; border: 1px solid #2a2d38; border-radius: 12px; z-index: 100; overflow-y: auto; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  #schedule-panel.open { display: block; }
  #schedule-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; }
  #schedule-overlay.open { display: block; }
  .schedule-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #1f222d; }
  .schedule-row .week { width: 60px; font-weight: 700; color: #8b8fa3; font-size: 12px; }
  .schedule-row .topic { flex: 1; font-size: 13px; }
  .schedule-row .hours { width: 50px; text-align: right; font-size: 12px; color: #6b7085; }
  .schedule-row .marks { width: 70px; text-align: right; font-size: 12px; color: #c084fc; }
  .schedule-config { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .schedule-config label { font-size: 12px; color: #8b8fa3; }
  .schedule-config input { padding: 4px 8px; background: #12141b; border: 1px solid #2a2d38; border-radius: 4px; color: #e1e4ea; font-size: 13px; width: 140px; }

  /* Loading */
  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #6b7085; }
  #loading h2 { margin-bottom: 8px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Matric Explorer</h1>
    <p>CAPS Mathematics & Physical Sciences</p>
    <input type="text" id="search" placeholder="Search topics..." />
  </div>
  <div id="progress-bar">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;font-weight:600;color:#8b8fa3">Progress</span>
      <button onclick="openSchedule()" style="padding:3px 10px;border-radius:4px;border:1px solid #2a2d38;background:transparent;color:#c084fc;font-size:11px;cursor:pointer">Study Plan</button>
    </div>
    <div class="progress-track"><div class="progress-fill mastered" id="progress-mastered" style="width:0%"></div></div>
    <div class="progress-stats" id="progress-stats"></div>
  </div>
  <div id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="math">Maths</button>
    <button class="filter-btn" data-filter="physics">Physics</button>
    <button class="filter-btn" data-filter="chemistry">Chemistry</button>
    <button class="filter-btn" data-filter="gr10">Gr 10</button>
    <button class="filter-btn" data-filter="gr11">Gr 11</button>
    <button class="filter-btn" data-filter="gr12">Gr 12</button>
  </div>
  <div id="node-list"></div>
</div>

<div id="main">
  <div id="graph-container">
    <canvas id="graph"></canvas>
    <div id="graph-info">Drag to pan. Scroll to zoom. Click a node to explore.</div>
    <div id="loading"><h2>Loading curriculum...</h2><p>Drag the JSON files into this folder or edit the paths below.</p></div>
  </div>
  <div id="detail">
    <div id="detail-header">
      <h2 id="detail-title">-</h2>
      <button id="detail-close">&times;</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<div id="schedule-overlay" onclick="closeSchedule()"></div>
<div id="schedule-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h2 style="font-size:18px;font-weight:700;color:#fff">Study Plan Generator</h2>
    <button onclick="closeSchedule()" style="background:none;border:none;color:#8b8fa3;font-size:20px;cursor:pointer">&times;</button>
  </div>
  <div class="schedule-config">
    <div><label>Exam date</label><br><input type="date" id="exam-date" value="2026-10-26"></div>
    <div><label>Hours/day</label><br><input type="number" id="hours-per-day" value="3" min="1" max="12"></div>
    <div><label>Days/week</label><br><input type="number" id="days-per-week" value="5" min="1" max="7"></div>
  </div>
  <button onclick="generateSchedule()" style="padding:8px 20px;border-radius:6px;border:none;background:#2563eb;color:#fff;font-weight:600;cursor:pointer;margin-bottom:16px">Generate Schedule</button>
  <div id="schedule-output"></div>
</div>

<script>
// ============================================================
// Data loading — embedded from generated JSON
// ============================================================

let GRAPH = null;
let LESSONS = {};
let selectedNode = null;

// Load the unified graph
async function loadData() {
  try {
    const graphResp = await fetch('caps-unified-matric.json');
    GRAPH = await graphResp.json();

    // Try loading generated lessons
    for (const node of GRAPH.nodes) {
      const filename = node.id.toLowerCase().replace(/\./g, '.') + '.json';
      const grade = node.grade_levels[0]?.toLowerCase() || 'grade12';
      const subject = node.subject_area === 'Mathematics' ? 'math' : 'physics';
      const gradeNum = grade.replace('grade', '');
      const path = `generated/${subject}-${gradeNum}/${filename}`;
      try {
        const resp = await fetch(path);
        if (resp.ok) LESSONS[node.id] = await resp.json();
      } catch(e) { /* lesson not found, ok */ }
    }

    document.getElementById('loading').style.display = 'none';
    init();
  } catch(e) {
    document.getElementById('loading').innerHTML = `<h2>Could not load curriculum data</h2><p>Make sure caps-unified-matric.json is in the same folder.<br>Error: ${e.message}</p>`;
  }
}

// ============================================================
// Graph visualization (Canvas-based force layout)
// ============================================================

let nodes = [], edges = [];
let canvas, ctx, W, H;
let offsetX = 0, offsetY = 0, scale = 1;
let dragging = false, dragStartX, dragStartY;
let hoveredNode = null;

const COLORS = {
  'Mathematics': { node: '#3b82f6', glow: 'rgba(59,130,246,0.3)' },
  'Physical Sciences': { node: '#22c55e', glow: 'rgba(34,197,94,0.3)' },
};

const GRADE_Y = { 'Grade10': -200, 'Grade11': 0, 'Grade12': 200 };

function init() {
  canvas = document.getElementById('graph');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);

  // Build node positions
  const mathNodes = GRAPH.nodes.filter(n => n.subject_area === 'Mathematics');
  const physNodes = GRAPH.nodes.filter(n => n.subject_area !== 'Mathematics');

  function layoutGroup(group, xOffset) {
    const byGrade = {};
    group.forEach(n => {
      const g = n.grade_levels[0] || 'Grade12';
      if (!byGrade[g]) byGrade[g] = [];
      byGrade[g].push(n);
    });
    Object.entries(byGrade).forEach(([grade, gnodes]) => {
      const y = GRADE_Y[grade] || 0;
      gnodes.forEach((n, i) => {
        const spacing = 90;
        const totalW = (gnodes.length - 1) * spacing;
        nodes.push({
          id: n.id,
          x: xOffset + (i * spacing - totalW / 2),
          y: y + (Math.random() - 0.5) * 30,
          vx: 0, vy: 0,
          data: n,
          radius: 18,
        });
      });
    });
  }

  layoutGroup(mathNodes, -250);
  layoutGroup(physNodes, 300);

  // Build edge list
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  GRAPH.edges.forEach(e => {
    if (nodeMap[e.from] && nodeMap[e.to]) {
      edges.push({ from: nodeMap[e.from], to: nodeMap[e.to], strength: e.strength_permille || 800 });
    }
  });

  // Simple force simulation
  for (let iter = 0; iter < 150; iter++) {
    // Repulsion between all nodes
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        const force = 800 / (d * d);
        nodes[i].vx -= (dx / d) * force;
        nodes[i].vy -= (dy / d) * force;
        nodes[j].vx += (dx / d) * force;
        nodes[j].vy += (dy / d) * force;
      }
    }
    // Attraction along edges
    edges.forEach(e => {
      const dx = e.to.x - e.from.x;
      const dy = e.to.y - e.from.y;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;
      const force = (d - 100) * 0.01;
      e.from.vx += (dx / d) * force;
      e.from.vy += (dy / d) * force;
      e.to.vx -= (dx / d) * force;
      e.to.vy -= (dy / d) * force;
    });
    // Grade-level anchoring
    nodes.forEach(n => {
      const targetY = GRADE_Y[n.data.grade_levels[0]] || 0;
      n.vy += (targetY - n.y) * 0.05;
      // Subject grouping
      const targetX = n.data.subject_area === 'Mathematics' ? -250 : 300;
      n.vx += (targetX - n.x) * 0.01;
    });
    // Apply velocity with damping
    nodes.forEach(n => {
      n.x += n.vx * 0.3;
      n.y += n.vy * 0.3;
      n.vx *= 0.8;
      n.vy *= 0.8;
    });
  }

  // Center the graph
  const cx = nodes.reduce((s, n) => s + n.x, 0) / nodes.length;
  const cy = nodes.reduce((s, n) => s + n.y, 0) / nodes.length;
  offsetX = W / 2 - cx;
  offsetY = H / 2 - cy;
  scale = 1.2;

  // Events
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('wheel', onWheel);
  canvas.addEventListener('click', onClick);

  buildSidebar();
  updateProgressBar();
  render();
}

function resize() {
  const container = document.getElementById('graph-container');
  W = container.clientWidth;
  H = container.clientHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  if (nodes.length) render();
}

function toScreen(x, y) {
  return [(x + offsetX) * scale, (y + offsetY) * scale];
}

function toWorld(sx, sy) {
  return [sx / scale - offsetX, sy / scale - offsetY];
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(offsetX * scale, offsetY * scale);
  ctx.scale(scale, scale);

  // Draw edges
  edges.forEach(e => {
    ctx.beginPath();
    ctx.moveTo(e.from.x, e.from.y);
    ctx.lineTo(e.to.x, e.to.y);
    ctx.strokeStyle = 'rgba(100,110,140,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Arrow
    const dx = e.to.x - e.from.x;
    const dy = e.to.y - e.from.y;
    const d = Math.sqrt(dx * dx + dy * dy) || 1;
    const ax = e.to.x - (dx / d) * (e.to.radius + 4);
    const ay = e.to.y - (dy / d) * (e.to.radius + 4);
    const angle = Math.atan2(dy, dx);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - 6 * Math.cos(angle - 0.4), ay - 6 * Math.sin(angle - 0.4));
    ctx.lineTo(ax - 6 * Math.cos(angle + 0.4), ay - 6 * Math.sin(angle + 0.4));
    ctx.fillStyle = 'rgba(100,110,140,0.4)';
    ctx.fill();
  });

  // Draw nodes
  nodes.forEach(n => {
    const colors = COLORS[n.data.subject_area] || COLORS['Mathematics'];
    const isSelected = selectedNode && selectedNode.id === n.id;
    const isHovered = hoveredNode && hoveredNode.id === n.id;

    // Glow
    if (isSelected || isHovered) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.radius + 8, 0, Math.PI * 2);
      ctx.fillStyle = colors.glow;
      ctx.fill();
    }

    // Circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
    ctx.fillStyle = isSelected ? '#fff' : colors.node;
    ctx.fill();
    ctx.strokeStyle = isSelected ? colors.node : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = isSelected ? 3 : 1;
    ctx.stroke();

    // Grade indicator
    const gradeColors = { Grade10: '#4ade80', Grade11: '#facc15', Grade12: '#f87171' };
    const gc = gradeColors[n.data.grade_levels[0]] || '#888';
    ctx.beginPath();
    ctx.arc(n.x + n.radius * 0.6, n.y - n.radius * 0.6, 5, 0, Math.PI * 2);
    ctx.fillStyle = gc;
    ctx.fill();

    // Label
    if (scale > 0.6) {
      const label = shortLabel(n.data);
      ctx.font = '10px -apple-system, sans-serif';
      ctx.fillStyle = isSelected ? colors.node : '#b0b4c3';
      ctx.textAlign = 'center';
      ctx.fillText(label, n.x, n.y + n.radius + 14);
    }
  });

  // Grade labels
  ctx.font = 'bold 14px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(139,143,163,0.4)';
  ctx.textAlign = 'left';
  const minX = Math.min(...nodes.map(n => n.x)) - 60;
  Object.entries(GRADE_Y).forEach(([g, y]) => {
    ctx.fillText(g.replace('Grade', 'Grade '), minX - 40, y + 5);
  });

  // Subject labels
  ctx.textAlign = 'center';
  ctx.fillText('Mathematics', -250, GRADE_Y.Grade10 - 50);
  ctx.fillText('Physical Sciences', 300, GRADE_Y.Grade10 - 50);

  ctx.restore();
}

function shortLabel(data) {
  let t = data.title;
  // Strip common prefixes
  t = t.replace(/^(Mechanics — |Waves — |Electricity — |Modern Physics — |Chemical Change — |Matter and Materials — |Organic Chemistry — )/, '');
  if (t.length > 22) t = t.substring(0, 20) + '...';
  return t;
}

function hitTest(mx, my) {
  const [wx, wy] = toWorld(mx, my);
  for (const n of nodes) {
    const dx = wx - n.x;
    const dy = wy - n.y;
    if (dx * dx + dy * dy < (n.radius + 4) * (n.radius + 4)) return n;
  }
  return null;
}

function onMouseDown(e) { dragging = true; dragStartX = e.offsetX; dragStartY = e.offsetY; }
function onMouseUp() { dragging = false; }
function onMouseMove(e) {
  if (dragging) {
    offsetX += (e.offsetX - dragStartX) / scale;
    offsetY += (e.offsetY - dragStartY) / scale;
    dragStartX = e.offsetX;
    dragStartY = e.offsetY;
    render();
  } else {
    const prev = hoveredNode;
    hoveredNode = hitTest(e.offsetX, e.offsetY);
    if (hoveredNode !== prev) {
      canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';
      render();
    }
  }
}
function onWheel(e) {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  scale *= factor;
  scale = Math.max(0.3, Math.min(3, scale));
  render();
}
function onClick(e) {
  const hit = hitTest(e.offsetX, e.offsetY);
  if (hit) selectNode(hit.data);
}

// ============================================================
// Sidebar
// ============================================================

function buildSidebar() {
  const list = document.getElementById('node-list');
  list.innerHTML = '';
  const filtered = getFilteredNodes();
  filtered.forEach(n => {
    const el = document.createElement('div');
    const grade = (n.grade_levels[0] || '').replace('Grade', 'Gr');
    const subjectClass = n.subject_area === 'Mathematics' ? 'math' : 'physics';
    const gradeClass = grade.toLowerCase().replace(' ', '');
    el.className = `node-item ${subjectClass}`;
    if (selectedNode && selectedNode.id === n.id) el.classList.add('selected');
    const status = getNodeStatus(n.id);
    const statusIcon = status === 'mastered' ? '<span class="status-icon" style="color:#22c55e">&#10003;</span>'
      : status === 'studying' ? '<span class="status-icon" style="color:#facc15">&#9679;</span>' : '';
    const examBadge = n.exam_weight ? `<span class="exam-badge">${n.exam_weight.marks}m</span>` : '';
    el.innerHTML = `<div class="title">${statusIcon}${n.title}${examBadge}</div>
      <div class="meta"><span class="grade-badge ${gradeClass}">${grade}</span>${n.subdomain}</div>`;
    el.addEventListener('click', () => selectNode(n));
    list.appendChild(el);
  });
}

function getFilteredNodes() {
  const activeFilters = [...document.querySelectorAll('.filter-btn.active')].map(b => b.dataset.filter);
  const search = document.getElementById('search').value.toLowerCase();
  let filtered = GRAPH.nodes;

  if (!activeFilters.includes('all')) {
    filtered = filtered.filter(n => {
      const isMath = n.subject_area === 'Mathematics';
      const isPhysics = n.tags?.some(t => t.includes('physics')) || n.subdomain?.includes('Physics');
      const isChem = n.tags?.some(t => t.includes('chemistry')) || n.subdomain?.includes('Chemistry');
      const grade = n.grade_levels[0] || '';

      if (activeFilters.includes('math') && isMath) return true;
      if (activeFilters.includes('physics') && isPhysics) return true;
      if (activeFilters.includes('chemistry') && isChem) return true;
      if (activeFilters.includes('gr10') && grade === 'Grade10') return true;
      if (activeFilters.includes('gr11') && grade === 'Grade11') return true;
      if (activeFilters.includes('gr12') && grade === 'Grade12') return true;
      return false;
    });
  }

  if (search) {
    filtered = filtered.filter(n =>
      n.title.toLowerCase().includes(search) ||
      n.description.toLowerCase().includes(search) ||
      n.subdomain.toLowerCase().includes(search)
    );
  }

  return filtered;
}

// Filter buttons
document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  const filter = e.target.dataset.filter;
  if (filter === 'all') {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
  } else {
    document.querySelector('.filter-btn[data-filter="all"]').classList.remove('active');
    e.target.classList.toggle('active');
    if (!document.querySelector('.filter-btn.active')) {
      document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
    }
  }
  buildSidebar();
});

document.getElementById('search').addEventListener('input', buildSidebar);

// ============================================================
// Detail panel
// ============================================================

function selectNode(nodeData) {
  selectedNode = nodeData;
  buildSidebar();
  render();
  showDetail(nodeData);

  // Center graph on node
  const gn = nodes.find(n => n.id === nodeData.id);
  if (gn) {
    const detailH = document.getElementById('detail').offsetHeight || 0;
    offsetX = (W / 2) / scale - gn.x;
    offsetY = ((H - detailH) / 2) / scale - gn.y;
    render();
  }
}

function showDetail(n) {
  const detail = document.getElementById('detail');
  const body = document.getElementById('detail-body');
  const title = document.getElementById('detail-title');
  detail.classList.add('open');
  title.textContent = n.title;

  const lesson = LESSONS[n.id];
  const grade = (n.grade_levels[0] || '').replace('Grade', 'Grade ');
  const hours = n.estimated_hours || '?';

  // Prerequisites
  const prereqEdges = GRAPH.edges.filter(e => e.to === n.id);
  const prereqNodes = prereqEdges.map(e => GRAPH.nodes.find(nn => nn.id === e.from)).filter(Boolean);
  const prereqHtml = prereqNodes.length
    ? prereqNodes.map(p => `<li><a href="#" onclick="selectNode(GRAPH.nodes.find(n=>n.id==='${p.id}'));return false" style="color:#93c5fd">${p.title}</a></li>`).join('')
    : '<li style="color:#6b7085">None (entry point)</li>';

  // Resources
  const resources = (n.supplementary_resources || []).map(r =>
    `<a class="resource-link" href="${r.url}" target="_blank">${r.title}</a>`
  ).join('');

  let lessonHtml = '';
  if (lesson) {
    // Explanation
    const expl = lesson.lesson?.explanation || '';

    // Worked examples
    const examples = (lesson.lesson?.examples || []).map((ex, i) =>
      `<div class="example-card">
        <div class="problem">${ex.problem}</div>
        ${(ex.steps || []).map(s => `<div class="step"><strong>${s.instruction}</strong> → ${s.result}</div>`).join('')}
        <div class="answer">${ex.answer}</div>
      </div>`
    ).join('');

    // Practice problems
    const problems = (lesson.lesson?.practice_problems || []).map(p =>
      `<div class="problem-card">
        <div class="q">${p.question}</div>
        <div class="a">Answer: ${p.answer}</div>
        <div class="diff">${diffLabel(p.difficulty_permille)} | ${p.bloom_level}</div>
      </div>`
    ).join('');

    // Flashcards
    const flashcards = (lesson.flashcards || []).map(f =>
      `<div class="flashcard">
        <div class="front">${f.front}</div>
        <div class="back">${f.back}</div>
      </div>`
    ).join('');

    // Misconceptions
    const misconceptions = (lesson.lesson?.misconceptions || []).map(m =>
      `<div class="misconception">
        <div class="wrong">Common error: ${m.misconception}</div>
        <div class="right">Correct: ${m.correction}</div>
        <div class="why">${m.why_students_think_this}</div>
      </div>`
    ).join('');

    lessonHtml = `
      <div class="tabs">
        <div class="tab active" data-tab="learn">Learn</div>
        <div class="tab" data-tab="examples">Examples</div>
        <div class="tab" data-tab="practice">Practice</div>
        <div class="tab" data-tab="flashcards">Flashcards</div>
        <div class="tab" data-tab="pitfalls">Pitfalls</div>
      </div>

      <div class="tab-content active" data-tab="learn">
        <div class="section"><h3>Explanation</h3><p>${expl}</p></div>
        <div class="section"><h3>Key Vocabulary</h3>
          <ul>${(lesson.lesson?.key_vocabulary || []).map(v => `<li><strong>${v.term}</strong>: ${v.definition}</li>`).join('')}</ul>
        </div>
      </div>

      <div class="tab-content" data-tab="examples">
        <div class="section"><h3>Worked Examples</h3>${examples}</div>
      </div>

      <div class="tab-content" data-tab="practice">
        <div class="section"><h3>Practice Problems (${lesson.lesson?.practice_problems?.length || 0})</h3>${problems}</div>
      </div>

      <div class="tab-content" data-tab="flashcards">
        <div class="section"><h3>Flashcards (hover to reveal)</h3>${flashcards}</div>
      </div>

      <div class="tab-content" data-tab="pitfalls">
        <div class="section"><h3>Common Misconceptions</h3>${misconceptions}</div>
      </div>
    `;
  } else {
    lessonHtml = '<p style="color:#6b7085;margin:20px 0">No generated lesson content available for this topic.</p>';
  }

  const currentStatus = getNodeStatus(n.id);
  const examWeightHtml = n.exam_weight
    ? `<span class="exam-badge" style="font-size:13px;padding:3px 12px">Paper ${n.exam_weight.paper}: ${n.exam_weight.marks}/${n.exam_weight.total_paper_marks} marks (${n.exam_weight.percentage.toFixed(1)}%)</span>`
    : '';

  body.innerHTML = `
    <div class="status-btns">
      <button class="status-btn ${currentStatus === 'not-started' ? 'active' : ''}" data-status="not-started" onclick="setNodeStatus('${n.id}','not-started')">Not Started</button>
      <button class="status-btn ${currentStatus === 'studying' ? 'active' : ''}" data-status="studying" onclick="setNodeStatus('${n.id}','studying');showDetail(GRAPH.nodes.find(nn=>nn.id==='${n.id}'))">Studying</button>
      <button class="status-btn ${currentStatus === 'mastered' ? 'active' : ''}" data-status="mastered" onclick="setNodeStatus('${n.id}','mastered');showDetail(GRAPH.nodes.find(nn=>nn.id==='${n.id}'))">Mastered</button>
    </div>

    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <span class="grade-badge ${(n.grade_levels[0]||'').toLowerCase().replace('grade','gr')}" style="font-size:12px;padding:3px 10px">${grade}</span>
      ${examWeightHtml}
      <span style="color:#6b7085;font-size:13px">${n.subdomain} · ${hours}h estimated · ${n.bloom_level}</span>
    </div>

    <div class="section"><h3>Description</h3><p>${n.description}</p></div>

    <div class="section"><h3>Prerequisites</h3><ul>${prereqHtml}</ul></div>

    ${lessonHtml}

    <div class="section"><h3>Resources</h3><div>${resources || '<span style="color:#6b7085">None</span>'}</div></div>
  `;

  // Tab switching
  body.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      body.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      body.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      body.querySelector(`.tab-content[data-tab="${tab.dataset.tab}"]`).classList.add('active');
    });
  });

  resize();
  render();
}

function diffLabel(d) {
  if (d < 300) return 'Easy';
  if (d < 600) return 'Medium';
  if (d < 800) return 'Challenging';
  return 'Advanced';
}

document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('detail').classList.remove('open');
  selectedNode = null;
  buildSidebar();
  resize();
  render();
});

// Make selectNode globally accessible for prerequisite links
window.selectNode = selectNode;

// ============================================================
// Progress Tracking (localStorage)
// ============================================================

const PROGRESS_KEY = 'caps-matric-progress';

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}'); }
  catch { return {}; }
}

function saveProgress(p) {
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
  updateProgressBar();
}

function getNodeStatus(nodeId) {
  const p = loadProgress();
  return (p[nodeId] && p[nodeId].status) || 'not-started';
}

function setNodeStatus(nodeId, status) {
  const p = loadProgress();
  if (!p[nodeId]) p[nodeId] = {};
  p[nodeId].status = status;
  p[nodeId].lastVisited = Date.now();
  saveProgress(p);
  buildSidebar();
  render();
}

function updateProgressBar() {
  if (!GRAPH) return;
  const p = loadProgress();
  let mastered = 0, studying = 0;
  GRAPH.nodes.forEach(n => {
    const s = (p[n.id] && p[n.id].status) || 'not-started';
    if (s === 'mastered') mastered++;
    else if (s === 'studying') studying++;
  });
  const total = GRAPH.nodes.length;
  const pctM = (mastered / total * 100).toFixed(0);
  const pctS = (studying / total * 100).toFixed(0);
  document.getElementById('progress-mastered').style.width = pctM + '%';
  document.getElementById('progress-stats').innerHTML =
    `<span><span class="status-dot" style="background:#22c55e"></span>${mastered} mastered</span>` +
    `<span><span class="status-dot" style="background:#facc15"></span>${studying} studying</span>` +
    `<span><span class="status-dot" style="background:#4a4d58"></span>${total - mastered - studying} remaining</span>`;
}

// ============================================================
// Study Schedule Generator
// ============================================================

function openSchedule() {
  document.getElementById('schedule-panel').classList.add('open');
  document.getElementById('schedule-overlay').classList.add('open');
}

function closeSchedule() {
  document.getElementById('schedule-panel').classList.remove('open');
  document.getElementById('schedule-overlay').classList.remove('open');
}

function generateSchedule() {
  if (!GRAPH) return;
  const examDate = new Date(document.getElementById('exam-date').value);
  const hoursPerDay = parseInt(document.getElementById('hours-per-day').value) || 3;
  const daysPerWeek = parseInt(document.getElementById('days-per-week').value) || 5;
  const hoursPerWeek = hoursPerDay * daysPerWeek;
  const progress = loadProgress();

  const now = new Date();
  const weeksAvailable = Math.max(1, Math.floor((examDate - now) / (7 * 24 * 60 * 60 * 1000)));

  // Filter to non-mastered Gr12 topics first, then Gr11, then Gr10
  const gradeOrder = { 'Grade10': 0, 'Grade11': 1, 'Grade12': 2 };
  const topics = GRAPH.nodes
    .filter(n => {
      const s = (progress[n.id] && progress[n.id].status) || 'not-started';
      return s !== 'mastered';
    })
    .sort((a, b) => {
      // Sort by grade (Gr12 first for exam focus), then by exam weight
      const ga = gradeOrder[a.grade_levels[0]] || 0;
      const gb = gradeOrder[b.grade_levels[0]] || 0;
      if (gb !== ga) return gb - ga; // Gr12 first
      const wa = a.exam_weight ? a.exam_weight.marks : 0;
      const wb = b.exam_weight ? b.exam_weight.marks : 0;
      return wb - wa; // Higher marks first
    });

  // Calculate total hours needed
  const totalHours = topics.reduce((s, t) => s + (t.estimated_hours || 8), 0);
  const totalAvailable = weeksAvailable * hoursPerWeek;
  const scaleFactor = totalAvailable < totalHours ? totalAvailable / totalHours : 1;

  // Assign weeks
  let currentWeek = 1;
  let hoursThisWeek = 0;
  const schedule = [];

  topics.forEach(t => {
    const hours = Math.max(2, Math.round((t.estimated_hours || 8) * scaleFactor));
    if (hoursThisWeek + hours > hoursPerWeek && hoursThisWeek > 0) {
      currentWeek++;
      hoursThisWeek = 0;
    }
    const startDate = new Date(now.getTime() + (currentWeek - 1) * 7 * 24 * 60 * 60 * 1000);
    schedule.push({
      week: currentWeek,
      date: startDate.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' }),
      topic: t,
      hours: hours,
      marks: t.exam_weight ? t.exam_weight.marks : null,
      paper: t.exam_weight ? t.exam_weight.paper : null,
    });
    hoursThisWeek += hours;
  });

  // Render
  const out = document.getElementById('schedule-output');
  const gr12Count = topics.filter(t => (t.grade_levels[0] || '') === 'Grade12').length;
  out.innerHTML = `
    <div style="margin-bottom:12px;font-size:13px;color:#8b8fa3">
      ${weeksAvailable} weeks available | ${totalAvailable}h total | ${topics.length} topics remaining
      ${totalAvailable < totalHours ? `<span style="color:#f87171"> (${totalHours}h needed — schedule compressed)</span>` : ''}
    </div>
    <div style="margin-bottom:8px;font-size:12px;font-weight:700;color:#6b7085;display:flex">
      <span style="width:60px">Week</span><span style="flex:1">Topic</span><span style="width:50px;text-align:right">Hours</span><span style="width:70px;text-align:right">Marks</span>
    </div>
    ${schedule.map(s => {
      const gradeClass = (s.topic.grade_levels[0] || '').toLowerCase().replace('grade', 'gr');
      return `<div class="schedule-row">
        <span class="week">Wk ${s.week}<br><span style="font-weight:400;font-size:10px">${s.date}</span></span>
        <span class="topic">
          <span class="grade-badge ${gradeClass}" style="font-size:9px;padding:1px 4px">${gradeClass.toUpperCase()}</span>
          <a href="#" onclick="selectNode(GRAPH.nodes.find(n=>n.id==='${s.topic.id}'));closeSchedule();return false" style="color:#93c5fd;text-decoration:none">${s.topic.title}</a>
        </span>
        <span class="hours">${s.hours}h</span>
        <span class="marks">${s.marks ? `P${s.paper}: ${s.marks}` : '—'}</span>
      </div>`;
    }).join('')}
    <div style="margin-top:16px;padding:12px;background:#1f222d;border-radius:8px;font-size:12px;color:#8b8fa3">
      <strong style="color:#c084fc">Tip:</strong> Focus on Gr12 topics first — they carry the exam marks.
      ${gr12Count > 0 ? `${gr12Count} Gr12 topics remaining, prioritized by mark weight.` : 'All Gr12 topics mastered!'}
    </div>
  `;
}

// ============================================================
// Enhanced rendering with progress colors
// ============================================================

const origRender = render;
render = function() {
  // Patch node colors based on progress
  nodes.forEach(n => {
    const status = getNodeStatus(n.id);
    n._status = status;
  });
  origRender();
  // Draw progress rings on top
  if (!ctx || !nodes.length) return;
  ctx.save();
  ctx.translate(offsetX * scale, offsetY * scale);
  ctx.scale(scale, scale);
  nodes.forEach(n => {
    if (n._status === 'mastered') {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.radius + 3, 0, Math.PI * 2);
      ctx.strokeStyle = '#22c55e';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    } else if (n._status === 'studying') {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.radius + 3, 0, Math.PI * 2);
      ctx.strokeStyle = '#facc15';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  });
  ctx.restore();
};

loadData();
