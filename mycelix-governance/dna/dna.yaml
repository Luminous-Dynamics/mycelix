    - name: constitution
      path: "../target/wasm32-unknown-unknown/release/constitution.wasm"
      dependencies:
        - name: constitution_integrity

    - name: governance_bridge
      path: "../target/wasm32-unknown-unknown/release/governance_bridge.wasm"
      dependencies:
        - name: governance_bridge_integrity
        - name: proposals_integrity
        - name: voting_integrity

    - name: threshold_signing
      path: "../target/wasm32-unknown-unknown/release/threshold_signing_coordinator.wasm"
      dependencies:
        - name: threshold_signing_integrity
        - name: voting_integrity

    - name: councils
      path: "../target/wasm32-unknown-unknown/release/councils.wasm"
      dependencies:
        - name: councils_integrity
