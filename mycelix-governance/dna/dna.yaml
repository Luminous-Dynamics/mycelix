---
manifest_version: "0"
name: mycelix_governance_dna

integrity:
  network_seed: "mycelix-governance-v1"
  zomes:
    - name: proposals_integrity
      path: "../target/wasm32-unknown-unknown/release/proposals_integrity.wasm"

    - name: voting_integrity
      path: "../target/wasm32-unknown-unknown/release/voting_integrity.wasm"

    - name: execution_integrity
      path: "../target/wasm32-unknown-unknown/release/execution_integrity.wasm"

    - name: constitution_integrity
      path: "../target/wasm32-unknown-unknown/release/constitution_integrity.wasm"

    - name: governance_bridge_integrity
      path: "../target/wasm32-unknown-unknown/release/governance_bridge_integrity.wasm"

    - name: threshold_signing_integrity
      path: "../target/wasm32-unknown-unknown/release/threshold_signing_integrity.wasm"

    - name: councils_integrity
      path: "../target/wasm32-unknown-unknown/release/councils_integrity.wasm"

    - name: jurisdiction_integrity
      path: "../target/wasm32-unknown-unknown/release/jurisdiction_integrity.wasm"

coordinator:
