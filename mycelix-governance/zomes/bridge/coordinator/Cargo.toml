[package]
name = "governance_bridge"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "Cross-hApp bridge coordinator zome for Mycelix Governance"

[lib]
crate-type = ["cdylib", "rlib"]
name = "governance_bridge"

[dependencies]
hdk = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
mycelix-bridge-common = { workspace = true }
mycelix-bridge-entry-types = { workspace = true }
governance_bridge_integrity = { path = "../integrity" }
governance-utils = { workspace = true }
# WASM compatibility: getrandom 0.3 with custom backend (HDK provides __getrandom_v03_custom)
getrandom_03 = { workspace = true }
