<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Civic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link data-trunk rel="css" href="style/main.css" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖</text></svg>" />
</head>
<body>
    <!-- Holochain conductor connection probe.
         Attempts WebSocket handshake; sets window.__HC_STATUS for Rust to read.
         Gracefully falls back to mock mode if conductor is unavailable. -->
    <script id="holochain-bridge">
    (function() {
        window.__HC_STATUS = 'connecting';
        var WS_URL = window.__HC_CONDUCTOR_URL || 'ws://localhost:8888';
        var TIMEOUT_MS = 3000;
        try {
            var ws = new WebSocket(WS_URL);
            var timer = setTimeout(function() {
                ws.close();
                window.__HC_STATUS = 'mock';
            }, TIMEOUT_MS);
            ws.onopen = function() {
                clearTimeout(timer);
                window.__HC_STATUS = 'connected';
                ws.close();
            };
            ws.onerror = function() {
                clearTimeout(timer);
                window.__HC_STATUS = 'mock';
            };
        } catch (e) {
            window.__HC_STATUS = 'mock';
        }
    })();
    </script>
</body>
</html>
