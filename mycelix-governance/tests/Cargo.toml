[package]
name = "mycelix-governance-tests"
version = "0.1.0"
edition = "2021"
authors = ["Luminous Dynamics <dev@luminous-dynamics.com>"]
license = "AGPL-3.0-or-later"
description = "Integration tests for Mycelix Governance Holochain zomes"
autotests = false

[dependencies]
# Holochain testing dependencies (NO zome crate imports to avoid duplicate symbols)
holochain = { version = "0.6", features = ["test_utils", "sweettest"] }
holochain_types = "0.6"
hdk = "0.6"
hdi = "0.7"

# Async runtime for tests
tokio = { version = "1.35", features = ["full", "test-util"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Serialization (msgpack for Holochain entry deserialization)
rmp-serde = "1.1"

# Utilities
chrono = "0.4"
uuid = { version = "1.6", features = ["v4"] }

# Crypto for DKG ceremony E2E tests
feldman-dkg = { path = "../../crates/feldman-dkg", features = ["ml-kem-768", "ml-dsa-65"] }
k256 = { version = "0.13", default-features = false, features = ["arithmetic", "ecdsa"] }
rand = "0.8"
blake3 = "1.5"

[[test]]
name = "sweettest_integration"
path = "sweettest_integration.rs"

[[test]]
name = "sweettest_adversarial"
path = "sweettest_adversarial.rs"

[workspace]
