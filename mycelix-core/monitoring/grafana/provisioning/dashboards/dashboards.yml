apiVersion: 1

providers:
  - name: 'Mycelix FL Dashboards'
    orgId: 1
    folder: 'Mycelix FL'
    folderUid: 'mycelix-fl'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/mycelix
      foldersFromFilesStructure: false
