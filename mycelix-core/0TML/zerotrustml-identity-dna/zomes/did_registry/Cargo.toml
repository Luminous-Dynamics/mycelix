[package]
name = "did_registry"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]
name = "did_registry"

[dependencies]
hdk = { workspace = true }
serde = { workspace = true, features = ["derive"] }
holochain_serialized_bytes = "0.0.56"

# Ed25519 signature verification
ed25519-dalek = { version = "2.1", default-features = false, features = ["alloc"] }
bs58 = "0.5"  # For multibase (base58btc) decoding
serde_json = "1.0"  # For canonical message serialization
