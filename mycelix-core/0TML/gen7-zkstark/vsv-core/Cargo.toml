[package]
name = "vsv-core"
version = "0.1.0"
edition = "2021"

[features]
default = ["bench-fixtures"]
bench-fixtures = []

[dependencies]
# No external dependencies - pure Rust for zkVM compatibility

[dev-dependencies]
approx = "0.5"
criterion = { version = "0.5", default-features = false, features = ["html_reports"] }

[[bench]]
name = "loss"
harness = false
