[package]
name = "gen7-zkstark"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
# PyO3 for Python bindings
pyo3 = { version = "0.20", features = ["extension-module"] }

# RISC Zero zkVM (same version as host)
risc0-zkvm = { version = "^3.0.3" }
methods = { path = "methods" }

# Serialization
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"

# Hashing
sha2 = "0.10"
