[package]
name = "winterfell-pogq"
version = "0.1.0"
edition = "2021"
description = "Winterfell STARK prover for PoGQ federated learning validation"
license = "AGPL-3.0-or-later"
authors = ["Luminous Dynamics <contact@luminousdynamics.org>"]
repository = "https://github.com/Luminous-Dynamics/Mycelix-Core"
readme = "README.md"

[lib]
name = "winterfell_pogq"
crate-type = ["cdylib", "rlib"]  # cdylib for Python, rlib for Rust

[dependencies]
# Python bindings (optional)
pyo3 = { version = "0.22", features = ["extension-module"], optional = true }
winterfell = "0.13.1"
math = { package = "winter-math", version = "0.13.1" }
crypto = { package = "winter-crypto", version = "0.13.1" }
utils = { package = "winter-utils", version = "0.13.1" }

# Shared core logic (commented out - pogq module not in current vsv-core)
# vsv-core = { path = "../vsv-core" }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography
blake3 = "1.5"
hex = "0.4"

# CLI
clap = { version = "4.5", features = ["derive"] }

[dev-dependencies]
criterion = "0.7"
proptest = "1.6"
rand = "0.8"

[[bin]]
name = "winterfell-prover"
path = "src/bin/prover.rs"

[[bin]]
name = "winterfell-benchmark"
path = "src/bin/benchmark.rs"

[[bin]]
name = "lean-benchmarks"
path = "src/bin/lean_benchmarks.rs"

[features]
default = []
python = ["pyo3"]
