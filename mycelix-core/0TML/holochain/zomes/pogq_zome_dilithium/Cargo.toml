[package]
name = "pogq_zome_dilithium"
version = "0.1.0"
edition = "2021"
authors = ["Luminous Dynamics <tristan.stoltz@evolvingresonantcocreationism.com>"]
description = "Holochain zome for PoGQ Byzantine detection with RISC Zero + Dilithium authentication (Phase 2.5)"

[lib]
crate-type = ["cdylib", "rlib"]
name = "pogq_zome_dilithium"

# Empty workspace to prevent parent workspace detection
[workspace]

[dependencies]
# Holochain SDK (upgraded from 0.4)
hdk = "0.6.0"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Cryptography for Dilithium message hashing
sha2 = "0.10"

# vsv-core for shared types (DecisionJournal, provenance structures)
vsv-core = { path = "../../../vsv-stark/vsv-core" }

# NOTE: RISC Zero dependencies removed - cannot compile to wasm32-unknown-unknown
# Full ZK proof verification requires external service (see VERIFICATION_STRATEGY.md)

# NOTE: Dilithium dependencies NOT included - signature verification will be done externally
# Dilithium crypto libraries (pqcrypto, oqs) do not compile to WASM
# For Phase 2.5 M0: Trust coordinator's pre-verification before publishing
# For Production: External verification service or wait for WASM-compatible Dilithium

[dev-dependencies]
# Holochain test harness for integration tests
holochain = { version = "0.6", features = ["test_utils", "sweettest"] }
holochain_test_wasm_common = "0.6"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[features]
default = []

[profile.release]
opt-level = "z"  # Optimize for size (WASM target)
lto = true
codegen-units = 1
