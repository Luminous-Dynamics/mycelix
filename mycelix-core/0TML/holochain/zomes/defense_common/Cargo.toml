[package]
name = "defense_common"
version = "0.1.0"
edition = "2021"
description = "Common utilities for Byzantine defense zomes: error handling, logging, metrics"
authors = ["Luminous Dynamics Research Team"]
license = "AGPL-3.0-or-later"

[workspace]

[lib]
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"

# HDK for Holochain types (optional, for AgentPubKey) — upgraded from 0.4
hdk = { version = "0.6.0", optional = true }

[features]
default = []
holochain = ["hdk"]
