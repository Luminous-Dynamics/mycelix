# ZeroTrustML Holochain Conductor Configuration (TOML)
# Production-ready config with external WebSocket access

data_root_path = "/data/holochain-zerotrustml"

# Network configuration
[network]
bootstrap_url = "https://dev-test-bootstrap2.holochain.org/"
signal_url = "wss://dev-test-bootstrap2.holochain.org/"
target_arc_factor = 1

# Admin WebSocket interface - BIND TO 0.0.0.0 for external access
[[admin_interfaces]]
driver = { type = "websocket", port = 8888, bind_address = "0.0.0.0" }
allowed_origins = ["*"]  # Allow all origins (restrict in production)

# Keystore configuration
[keystore]
type = "lair_server_in_proc"
lair_root = "/data/holochain-zerotrustml/lair"

# Database sync strategy
db_sync_strategy = "Fast"
