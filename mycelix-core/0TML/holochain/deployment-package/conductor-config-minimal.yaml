---
# ZeroTrustML Holochain Conductor - Minimal Working Config
# Based on holochain --create-config output

data_root_path: /tmp/holochain-zerotrustml

network:
  bootstrap_url: https://bootstrap.holo.host
  signal_url: wss://signal.holo.host
  target_arc_factor: 1

# Admin interface - INSIDE driver block (CORRECT!)
admin_interfaces:
  - driver:
      type: websocket
      port: 8888
      allowed_origins: '*'

# Keystore
keystore:
  type: lair_server_in_proc
  lair_root: /tmp/holochain-zerotrustml/lair

db_sync_strategy: Fast
