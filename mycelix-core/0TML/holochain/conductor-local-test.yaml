---
# ZeroTrustML Holochain Conductor - Local Testing Config
# Uses local directories for testing without root permissions

data_root_path: ./holochain-data

network:
  bootstrap_url: https://dev-test-bootstrap2.holochain.org/
  signal_url: wss://dev-test-bootstrap2.holochain.org/
  target_arc_factor: 1

# Admin interface on localhost
admin_interfaces:
  - driver:
      type: websocket
      port: 8888
      allowed_origins: '*'

# Keystore in local directory
keystore:
  type: lair_server_in_proc
  lair_root: ./holochain-data/lair

db_sync_strategy: Fast
