[package]
name = "mycelix-hyperfeel"
version = "0.1.0"
edition = "2021"
description = "Minimal Rust-first HyperFeel core for Mycelix federated learning"
license = "AGPL-3.0-or-later"

[lib]
name = "mycelix_hyperfeel"
path = "src/lib.rs"

[dependencies]
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
time = { version = "0.3", features = ["macros"] }

[dependencies.symthaea]
path = "../../../11-meta-consciousness/luminous-nix/symthaea-hlb"
optional = true
default-features = false

[features]
default = []
symthaea-hv = ["symthaea"]
