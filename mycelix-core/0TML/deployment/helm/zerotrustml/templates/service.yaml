apiVersion: v1
kind: Service
metadata:
  name: {{ include "zerotrustml.fullname" . }}
  labels:
    {{- include "zerotrustml.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.networkPort }}
    targetPort: network
    protocol: TCP
    name: network
  - port: {{ .Values.service.metricsPort }}
    targetPort: metrics
    protocol: TCP
    name: metrics
  - port: {{ .Values.service.gossipPort }}
    targetPort: gossip
    protocol: TCP
    name: gossip
  selector:
    {{- include "zerotrustml.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zerotrustml.fullname" . }}-headless
  labels:
    {{- include "zerotrustml.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
  - port: {{ .Values.service.networkPort }}
    targetPort: network
    protocol: TCP
    name: network
  - port: {{ .Values.service.gossipPort }}
    targetPort: gossip
    protocol: TCP
    name: gossip
  selector:
    {{- include "zerotrustml.selectorLabels" . | nindent 4 }}