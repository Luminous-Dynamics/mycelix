# =============================================================================
# Lair Keystore Configuration - Mycelix Core
# =============================================================================
#
# SECURITY WARNING:
#   This configuration file contains references to cryptographic secrets.
#   Actual secret values MUST be provided via environment variables.
#   NEVER commit actual secret values to version control.
#
# Required Environment Variables:
#   - LAIR_CONNECTION_KEY: Connection authentication key (44 chars, base64)
#   - LAIR_DATABASE_SALT: Database encryption salt (22 chars, base64)
#   - LAIR_RUNTIME_SECRETS_SALT: Runtime secrets salt (22 chars, base64)
#   - LAIR_CONTEXT_KEY_1: Context key part 1 (32 chars, base64)
#   - LAIR_CONTEXT_KEY_2: Context key part 2 (72 chars, base64)
#   - LAIR_ID_SEED_1: ID seed part 1 (32 chars, base64)
#   - LAIR_ID_SEED_2: ID seed part 2 (72 chars, base64)
#
# Generate secrets with: ./scripts/generate-secrets.sh
#
# =============================================================================

# Connection URL with environment variable for the key
# The key is substituted at runtime by the conductor startup script
connectionUrl: unix:///srv/luminous-dynamics/Mycelix-Core/socket?k=${LAIR_CONNECTION_KEY}

# The pid file for managing a running lair-keystore process
pidFile: /srv/luminous-dynamics/Mycelix-Core/pid_file

# The sqlcipher store file for persisting secrets
storeFile: /srv/luminous-dynamics/Mycelix-Core/store_file

# Configuration for managing sign_by_pub_key fallback
# in case the pub key does not exist in the lair store.
# - `signatureFallback: none`
# - ```
#   signatureFallback: !command
#     # 'program' will resolve to a path, specifying 'echo'
#     # will try to run './echo', probably not what you want.
#     program: "./my-executable"
#     # args are optional
#     args:
#       - test-arg1
#       - test-arg2
#   ```
signatureFallback: none

# =============================================================================
# Cryptographic Secrets (Environment Variable References)
# =============================================================================
# SECURITY: These values MUST be unique per deployment.
# Generate with: ./scripts/generate-secrets.sh
#
# WARNING: If you modify these after initial setup, you will lose access
# to existing keys.
# =============================================================================

# Database encryption salt - MUST be set via LAIR_DATABASE_SALT env var
databaseSalt: ${LAIR_DATABASE_SALT}

# Runtime secrets salt - MUST be set via LAIR_RUNTIME_SECRETS_SALT env var
runtimeSecretsSalt: ${LAIR_RUNTIME_SECRETS_SALT}

# Memory and operations limits for key derivation (Argon2id)
runtimeSecretsMemLimit: 268435456
runtimeSecretsOpsLimit: 3

# Runtime secrets context key - MUST be set via LAIR_CONTEXT_KEY_1 and _2 env vars
runtimeSecretsContextKey:
- ${LAIR_CONTEXT_KEY_1}
- ${LAIR_CONTEXT_KEY_2}

# Runtime secrets ID seed - MUST be set via LAIR_ID_SEED_1 and _2 env vars
runtimeSecretsIdSeed:
- ${LAIR_ID_SEED_1}
- ${LAIR_ID_SEED_2}
