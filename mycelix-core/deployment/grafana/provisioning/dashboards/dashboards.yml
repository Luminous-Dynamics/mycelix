# Grafana Dashboard Provisioning
# ===============================
#
# This file configures automatic dashboard loading from the dashboards directory.

apiVersion: 1

providers:
  - name: 'Mycelix Dashboards'
    orgId: 1
    folder: 'Mycelix'
    folderUid: 'mycelix'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
