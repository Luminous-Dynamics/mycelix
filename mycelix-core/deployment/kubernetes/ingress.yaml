# Mycelix Ingress Configuration
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mycelix-api
  namespace: mycelix
  labels:
    app.kubernetes.io/name: mycelix-api
    app.kubernetes.io/part-of: mycelix
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - api.testnet.mycelix.io
      secretName: mycelix-api-tls
  rules:
    - host: api.testnet.mycelix.io
      http:
        paths:
          - path: /fl
            pathType: Prefix
            backend:
              service:
                name: fl-aggregator
                port:
                  number: 8081
          - path: /coordinator
            pathType: Prefix
            backend:
              service:
                name: fl-coordinator
                port:
                  number: 8083
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mycelix-monitoring
  namespace: mycelix-monitoring
  labels:
    app.kubernetes.io/name: mycelix-monitoring
    app.kubernetes.io/part-of: mycelix
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: monitoring-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Mycelix Monitoring"
spec:
  tls:
    - hosts:
        - grafana.testnet.mycelix.io
        - prometheus.testnet.mycelix.io
      secretName: monitoring-tls
  rules:
    - host: grafana.testnet.mycelix.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    - host: prometheus.testnet.mycelix.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-server
                port:
                  number: 9090
---
# Cert-Manager ClusterIssuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@luminous-dynamics.org
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ops@luminous-dynamics.org
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx
