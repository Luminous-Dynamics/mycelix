# Mycelix Validator Deployment
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: validator
  namespace: mycelix-validators
  labels:
    app.kubernetes.io/name: validator
    app.kubernetes.io/component: consensus
    app.kubernetes.io/part-of: mycelix
spec:
  serviceName: validator
  replicas: 5
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: validator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: validator
        app.kubernetes.io/component: consensus
        app.kubernetes.io/part-of: mycelix
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: validator-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: validator
                topologyKey: topology.kubernetes.io/zone
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - validator
      containers:
        - name: validator
          image: ghcr.io/mycelix/validator:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: p2p
              containerPort: 9000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: health
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: VALIDATOR_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VALIDATOR_REGION
              valueFrom:
                configMapKeyRef:
                  name: validator-config
                  key: region
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: url
            - name: RUST_LOG
              value: "info,mycelix=debug"
          envFrom:
            - configMapRef:
                name: validator-config
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "14Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/started
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: validator-config
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: gp3
        resources:
          requests:
            storage: 250Gi
---
apiVersion: v1
kind: Service
metadata:
  name: validator
  namespace: mycelix-validators
  labels:
    app.kubernetes.io/name: validator
    app.kubernetes.io/component: consensus
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: p2p
      port: 9000
      targetPort: p2p
    - name: grpc
      port: 50051
      targetPort: grpc
  selector:
    app.kubernetes.io/name: validator
---
apiVersion: v1
kind: Service
metadata:
  name: validator-metrics
  namespace: mycelix-validators
  labels:
    app.kubernetes.io/name: validator
    app.kubernetes.io/component: consensus
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
  selector:
    app.kubernetes.io/name: validator
---
apiVersion: v1
kind: Service
metadata:
  name: validator-p2p
  namespace: mycelix-validators
  labels:
    app.kubernetes.io/name: validator
    app.kubernetes.io/component: consensus
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  ports:
    - name: p2p
      port: 9000
      targetPort: p2p
      protocol: TCP
  selector:
    app.kubernetes.io/name: validator
