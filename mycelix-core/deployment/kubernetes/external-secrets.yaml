# External Secrets Configuration for AWS Secrets Manager
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: validator-keys
  namespace: mycelix-validators
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: validator-keys
    creationPolicy: Owner
  data:
    - secretKey: signing_key
      remoteRef:
        key: mycelix/testnet/validator-keys
        property: signing_key
    - secretKey: p2p_key
      remoteRef:
        key: mycelix/testnet/validator-keys
        property: p2p_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ethereum-credentials
  namespace: mycelix
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: ethereum-credentials
    creationPolicy: Owner
  data:
    - secretKey: infura_project_id
      remoteRef:
        key: mycelix/testnet/ethereum
        property: infura_project_id
    - secretKey: wallet_private_key
      remoteRef:
        key: mycelix/testnet/ethereum
        property: wallet_private_key
