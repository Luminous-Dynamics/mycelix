# Mycelix Horizontal Pod Autoscaler Configurations
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fl-aggregator-hpa
  namespace: mycelix-fl
  labels:
    app.kubernetes.io/name: fl-aggregator
    app.kubernetes.io/part-of: mycelix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fl-aggregator
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: fl_submissions_queue_length
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
---
# Pod Disruption Budgets
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: validator-pdb
  namespace: mycelix-validators
  labels:
    app.kubernetes.io/name: validator
    app.kubernetes.io/part-of: mycelix
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: validator
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fl-aggregator-pdb
  namespace: mycelix-fl
  labels:
    app.kubernetes.io/name: fl-aggregator
    app.kubernetes.io/part-of: mycelix
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fl-aggregator
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fl-coordinator-pdb
  namespace: mycelix-fl
  labels:
    app.kubernetes.io/name: fl-coordinator
    app.kubernetes.io/part-of: mycelix
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fl-coordinator
---
# Priority Classes
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: mycelix-critical
  labels:
    app.kubernetes.io/part-of: mycelix
value: 1000000
globalDefault: false
description: "Critical priority for Mycelix validators and coordinators"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: mycelix-high
  labels:
    app.kubernetes.io/part-of: mycelix
value: 500000
globalDefault: false
description: "High priority for Mycelix FL aggregators"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: mycelix-normal
  labels:
    app.kubernetes.io/part-of: mycelix
value: 100000
globalDefault: false
description: "Normal priority for Mycelix workloads"
---
# Resource Quotas
apiVersion: v1
kind: ResourceQuota
metadata:
  name: validator-quota
  namespace: mycelix-validators
spec:
  hard:
    requests.cpu: "40"
    requests.memory: "160Gi"
    limits.cpu: "80"
    limits.memory: "280Gi"
    persistentvolumeclaims: "20"
    pods: "20"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: fl-quota
  namespace: mycelix-fl
spec:
  hard:
    requests.cpu: "80"
    requests.memory: "320Gi"
    limits.cpu: "160"
    limits.memory: "560Gi"
    pods: "50"
---
# Limit Ranges
apiVersion: v1
kind: LimitRange
metadata:
  name: validator-limits
  namespace: mycelix-validators
spec:
  limits:
    - type: Container
      default:
        cpu: "2"
        memory: "8Gi"
      defaultRequest:
        cpu: "1"
        memory: "4Gi"
      max:
        cpu: "8"
        memory: "32Gi"
      min:
        cpu: "500m"
        memory: "1Gi"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: fl-limits
  namespace: mycelix-fl
spec:
  limits:
    - type: Container
      default:
        cpu: "4"
        memory: "12Gi"
      defaultRequest:
        cpu: "2"
        memory: "8Gi"
      max:
        cpu: "16"
        memory: "64Gi"
      min:
        cpu: "500m"
        memory: "2Gi"
