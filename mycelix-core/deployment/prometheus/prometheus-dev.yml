# Prometheus Configuration for Local Development
#
# This configuration is used by docker-compose.dev.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    environment: development
    cluster: local

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Local validator (if running)
  - job_name: 'validator-local'
    static_configs:
      - targets: ['host.docker.internal:9090']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'validator-local'

  # Local FL aggregator (if running)
  - job_name: 'fl-aggregator-local'
    static_configs:
      - targets: ['host.docker.internal:9091']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'fl-aggregator-local'

  # Local FL coordinator (if running)
  - job_name: 'fl-coordinator-local'
    static_configs:
      - targets: ['host.docker.internal:9092']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'fl-coordinator-local'

  # PostgreSQL exporter (if deployed)
  - job_name: 'postgres'
    static_configs:
      - targets: ['host.docker.internal:9187']

  # Redis exporter (if deployed)
  - job_name: 'redis'
    static_configs:
      - targets: ['host.docker.internal:9121']

  # Docker containers
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
