apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mycelix-fl-node
  namespace: mycelix-testnet
  labels:
    app: fl-node
    app.kubernetes.io/name: mycelix
    app.kubernetes.io/instance: testnet
    app.kubernetes.io/component: fl-node
spec:
  serviceName: fl-nodes
  replicas: 5
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: fl-node
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: fl-node
        app.kubernetes.io/name: mycelix
        app.kubernetes.io/instance: testnet
        app.kubernetes.io/component: fl-node
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: mycelix-fl-node
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-bootstrap
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z bootstrap 9000; do
                echo "Waiting for bootstrap node..."
                sleep 5
              done
              echo "Bootstrap node is ready"
      containers:
        - name: fl-node
          image: mycelix/fl-node:testnet-latest
          imagePullPolicy: Always
          ports:
            - name: p2p
              containerPort: 9000
              protocol: TCP
            - name: api
              containerPort: 9001
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mycelix-config
          env:
            - name: MYCELIX_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MYCELIX_NODE_TYPE
              value: "seed"
            - name: BOOTSTRAP_NODES
              value: "bootstrap:9000"
            - name: FL_MODEL_PATH
              value: "/models"
            - name: DATABASE_URL
              value: "postgresql://mycelix:$(POSTGRES_PASSWORD)@postgres:5432/mycelix_testnet"
            - name: REDIS_URL
              value: "redis://redis-master:6379"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
            - name: models
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: fl-models-pvc
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: fl-node
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values:
                      - n2-standard-4
                      - n2-standard-8
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: fl-node
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: fl-node
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mycelix-fl-node
  namespace: mycelix-testnet
  labels:
    app.kubernetes.io/name: mycelix
    app.kubernetes.io/instance: testnet
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fl-models-pvc
  namespace: mycelix-testnet
  labels:
    app: fl-node
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
