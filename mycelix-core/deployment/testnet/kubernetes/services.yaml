apiVersion: v1
kind: Service
metadata:
  name: bootstrap
  namespace: mycelix-testnet
  labels:
    app: bootstrap
    app.kubernetes.io/name: mycelix
    app.kubernetes.io/instance: testnet
    app.kubernetes.io/component: bootstrap
spec:
  type: ClusterIP
  ports:
    - name: p2p
      port: 9000
      targetPort: p2p
      protocol: TCP
    - name: api
      port: 9001
      targetPort: api
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: bootstrap
---
apiVersion: v1
kind: Service
metadata:
  name: bootstrap-external
  namespace: mycelix-testnet
  labels:
    app: bootstrap
    app.kubernetes.io/name: mycelix
    app.kubernetes.io/instance: testnet
    app.kubernetes.io/component: bootstrap
  annotations:
    # For cloud load balancers
    # GKE: cloud.google.com/load-balancer-type: "External"
    # AWS: service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  ports:
    - name: p2p
      port: 9000
      targetPort: p2p
      protocol: TCP
    - name: api
      port: 9001
      targetPort: api
      protocol: TCP
  selector:
    app: bootstrap
---
apiVersion: v1
kind: Service
metadata:
  name: fl-nodes
  namespace: mycelix-testnet
  labels:
    app: fl-node
    app.kubernetes.io/name: mycelix
    app.kubernetes.io/instance: testnet
    app.kubernetes.io/component: fl-node
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - name: p2p
      port: 9000
      targetPort: p2p
      protocol: TCP
    - name: api
      port: 9001
      targetPort: api
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: fl-node
---
