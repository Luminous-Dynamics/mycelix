---
# =============================================================================
# Fluentd/Fluent Bit Configuration for Log Collection
# =============================================================================
# Collects network policy logs and forwards to central logging

apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-network-config
  namespace: mycelix-testnet
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Parsers_File  parsers.conf

    [INPUT]
        Name              tail
        Path              /var/log/calico/felix/*.log
        Tag               calico.felix
        Parser            json
        Refresh_Interval  10

    [INPUT]
        Name              tail
        Path              /var/log/network-audit/*.log
        Tag               network.audit
        Parser            syslog
        Refresh_Interval  10

    [FILTER]
        Name    grep
        Match   calico.felix
        Regex   msg deny|log

    [OUTPUT]
        Name              es
        Match             *
        Host              elasticsearch.logging.svc.cluster.local
        Port              9200
        Index             network-audit
        Type              _doc
        Logstash_Format   On
        Logstash_Prefix   netpol
        Retry_Limit       5

  parsers.conf: |
    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L

    [PARSER]
        Name        syslog
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<message>.+)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S%z

---
# =============================================================================
# Prometheus Metrics for NetworkPolicy Monitoring
# =============================================================================
# Track denied connections and policy violations

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: network-policy-alerts
  namespace: mycelix-testnet
  labels:
    app.kubernetes.io/name: mycelix
spec:
  groups:
    - name: network-policy
      rules:
        # Alert on high rate of denied connections
        - alert: HighNetworkPolicyDenials
          expr: |
            sum(rate(calico_denied_packets_total{namespace="mycelix-testnet"}[5m])) > 100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High rate of network policy denials"
            description: "More than 100 packets/sec being denied by network policies"

        # Alert on unexpected external connections
        - alert: UnexpectedExternalConnection
          expr: |
            sum(rate(hubble_flows_processed_total{
              namespace="mycelix-testnet",
              destination=~"(?!10\\.|172\\.16\\.|192\\.168\\.).*",
              verdict="DROPPED"
            }[5m])) > 10
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Unexpected external connection attempts"
            description: "Pods attempting connections to unexpected external IPs"

        # Track DNS queries (potential data exfiltration vector)
        - alert: HighDNSQueryRate
          expr: |
            sum(rate(hubble_dns_queries_total{namespace="mycelix-testnet"}[5m])) > 1000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Unusually high DNS query rate"
            description: "DNS query rate exceeds 1000 queries/sec - potential tunneling"

---
# Installation Notes:
#
# For Calico:
#   1. Enable Felix logging: calicoctl patch felixconfiguration default -p '{"spec":{"policySyncPathPrefix":"/var/log/calico"}}'
#   2. Apply this file: kubectl apply -f network-policy-logging.yaml
#   3. Verify logs: kubectl exec -n calico-system calico-node-xxx -- cat /var/log/calico/felix/felix.log
#
# For Cilium:
#   1. Enable Hubble: helm upgrade cilium cilium/cilium --set hubble.enabled=true
#   2. Access Hubble UI: kubectl port-forward -n kube-system svc/hubble-ui 12000:80
#   3. CLI access: hubble observe --namespace mycelix-testnet
#
# For Generic (sidecar):
#   1. Apply ConfigMap: kubectl apply -f network-policy-logging.yaml
#   2. Patch deployment with sidecar
#   3. View logs: kubectl logs <pod> -c network-audit
