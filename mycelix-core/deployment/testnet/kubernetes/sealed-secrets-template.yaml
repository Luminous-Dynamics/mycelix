# =============================================================================
# SECURITY BEST PRACTICES
# =============================================================================
#
# 1. NEVER commit raw secrets to version control
#    - Use .gitignore: *.raw.yaml, *-raw.yaml, secrets.yaml (raw)
#    - SealedSecrets (.yaml with encrypted data) ARE safe to commit
#
# 2. Use strict seal scope (default)
#    - Secrets can only be decrypted in the specified namespace/name
#    - Prevents accidental exposure in other namespaces
#
# 3. Implement secret rotation policy
#    - Rotate all secrets every 90 days minimum
#    - Rotate immediately on personnel changes
#    - Automate rotation where possible
#
# 4. Monitor secret access
#    - Enable Kubernetes audit logging
#    - Alert on unusual secret access patterns
#    - Review access logs regularly
#
# 5. Principle of least privilege
#    - Grant secret access only to pods that need it
#    - Use separate secrets for different components
#    - Avoid cluster-wide secrets
#
# 6. Backup encryption keys
#    - Export and securely store sealed-secrets master key
#    - Test recovery procedures regularly
#    - Document recovery process
#
# 7. Use network policies
#    - Restrict pod-to-pod communication
#    - Limit egress to required endpoints only
#
# =============================================================================
