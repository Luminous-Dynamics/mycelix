# =============================================================================
# MYCELIX SEALED SECRETS TEMPLATE
# =============================================================================
#
# This template shows how to use Bitnami Sealed Secrets for secure secret
# management in Kubernetes. Sealed Secrets encrypts secrets so they can be
# safely stored in version control.
#
# =============================================================================
# PREREQUISITES
# =============================================================================
#
# 1. Install Sealed Secrets Controller:
#
#    helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#    helm install sealed-secrets sealed-secrets/sealed-secrets \
#      --namespace kube-system \
#      --set-string fullnameOverride=sealed-secrets-controller
#
# 2. Install kubeseal CLI:
#
#    # macOS
#    brew install kubeseal
#
#    # Linux
#    wget https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.5/kubeseal-0.24.5-linux-amd64.tar.gz
#    tar -xvzf kubeseal-0.24.5-linux-amd64.tar.gz
#    sudo install -m 755 kubeseal /usr/local/bin/kubeseal
#
# =============================================================================
# ENCRYPTION WORKFLOW
# =============================================================================
#
# Step 1: Generate secrets locally (NEVER commit raw secrets!)
#
#    # Generate secure random values
#    export POSTGRES_PASSWORD=$(openssl rand -base64 32)
#    export GRAFANA_PASSWORD=$(openssl rand -base64 24)
#    export BOOTSTRAP_PRIVATE_KEY=$(openssl rand -hex 32)
#    export JWT_SECRET=$(openssl rand -base64 64)
#
# Step 2: Create a raw Kubernetes secret (temporary file)
#
#    kubectl create secret generic mycelix-secrets \
#      --namespace=mycelix-testnet \
#      --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
#      --from-literal=GRAFANA_PASSWORD="$GRAFANA_PASSWORD" \
#      --from-literal=BOOTSTRAP_PRIVATE_KEY="$BOOTSTRAP_PRIVATE_KEY" \
#      --from-literal=JWT_SECRET="$JWT_SECRET" \
#      --dry-run=client -o yaml > /tmp/mycelix-secrets-raw.yaml
#
# Step 3: Seal the secret
#
#    kubeseal --format=yaml \
#      --controller-name=sealed-secrets-controller \
#      --controller-namespace=kube-system \
#      < /tmp/mycelix-secrets-raw.yaml \
#      > sealed-mycelix-secrets.yaml
#
# Step 4: Securely delete the raw secret file
#
#    shred -u /tmp/mycelix-secrets-raw.yaml
#    # Or on macOS: rm -P /tmp/mycelix-secrets-raw.yaml
#
# Step 5: Apply the sealed secret to the cluster
#
#    kubectl apply -f sealed-mycelix-secrets.yaml
#
# =============================================================================
# ROTATION PROCEDURES
# =============================================================================
#
# === Regular Rotation (Recommended: Every 90 Days) ===
#
# 1. Generate new secret values
# 2. Create new SealedSecret with updated values
# 3. Apply to cluster (will update the underlying Secret)
# 4. Restart affected pods to pick up new secrets:
#
#    kubectl rollout restart deployment/mycelix-validator -n mycelix-testnet
#    kubectl rollout restart deployment/postgres -n mycelix-testnet
#    kubectl rollout restart deployment/grafana -n mycelix-testnet
#
# === Emergency Rotation (Compromise Response) ===
#
# 1. Immediately rotate ALL secrets (assume all are compromised)
# 2. Rotate the Sealed Secrets controller's signing key:
#
#    kubectl delete secret -n kube-system -l sealedsecrets.bitnami.com/sealed-secrets-key
#
# 3. Re-seal ALL existing SealedSecrets with new key
# 4. Audit access logs for unauthorized use
# 5. Document incident in security log
#
# === Certificate Rotation ===
#
# The Sealed Secrets controller rotates its key every 30 days by default.
# Old keys are retained to decrypt existing SealedSecrets.
#
# To manually rotate the certificate:
#
#    kubectl annotate sealedsecret mycelix-secrets \
#      sealedsecrets.bitnami.com/managed=true \
#      -n mycelix-testnet
#
# =============================================================================
# BACKUP AND RECOVERY
# =============================================================================
#
# CRITICAL: Back up the sealed-secrets controller private key!
#
# Export private key (store securely offline):
#
#    kubectl get secret -n kube-system \
#      -l sealedsecrets.bitnami.com/sealed-secrets-key \
#      -o yaml > sealed-secrets-master-key.yaml
#
# Store this key in a secure location (hardware security module, secure vault).
# Without this key, you CANNOT decrypt SealedSecrets if the cluster is lost.
#
# =============================================================================

---
# =============================================================================
# SEALED SECRET PLACEHOLDER - MYCELIX CORE SECRETS
# =============================================================================
#
# This is a TEMPLATE showing the structure of a SealedSecret.
# The encryptedData values below are PLACEHOLDERS - you must generate
# real sealed secrets using the workflow above.
#
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mycelix-secrets
  namespace: mycelix-testnet
  labels:
    app.kubernetes.io/name: mycelix
    app.kubernetes.io/instance: testnet
    app.kubernetes.io/component: secrets
    app.kubernetes.io/managed-by: sealed-secrets
  annotations:
    # Seal scope: strict = only decryptable in this namespace with this name
    sealedsecrets.bitnami.com/cluster-wide: "false"
    sealedsecrets.bitnami.com/namespace-wide: "false"
spec:
  encryptedData:
    # =========================================================================
    # PLACEHOLDER VALUES - REPLACE WITH ACTUAL SEALED VALUES
    # =========================================================================
    # Use kubeseal to generate real encrypted values. Example:
    #
    #   echo -n "your-secret-value" | \
    #     kubeseal --raw --namespace mycelix-testnet --name mycelix-secrets \
    #     --controller-name=sealed-secrets-controller \
    #     --controller-namespace=kube-system
    #
    # =========================================================================

    # PostgreSQL database password (min 32 characters recommended)
    # Generate: openssl rand -base64 32
    POSTGRES_PASSWORD: "REPLACE_WITH_SEALED_VALUE"

    # Grafana admin dashboard password (min 16 characters recommended)
    # Generate: openssl rand -base64 24
    GRAFANA_PASSWORD: "REPLACE_WITH_SEALED_VALUE"

    # Bootstrap node private key (256-bit hex)
    # Generate: openssl rand -hex 32
    # SECURITY: This key controls node identity - protect carefully!
    BOOTSTRAP_PRIVATE_KEY: "REPLACE_WITH_SEALED_VALUE"

    # JWT secret for API authentication (min 64 characters recommended)
    # Generate: openssl rand -base64 64
    JWT_SECRET: "REPLACE_WITH_SEALED_VALUE"
  template:
    metadata:
      name: mycelix-secrets
      namespace: mycelix-testnet
      labels:
        app.kubernetes.io/name: mycelix
        app.kubernetes.io/instance: testnet
        app.kubernetes.io/component: secrets
    type: Opaque

---
# =============================================================================
# SEALED SECRET PLACEHOLDER - POSTGRESQL SECRETS
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-secrets
  namespace: mycelix-testnet
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: testnet
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: sealed-secrets
spec:
  encryptedData:
    # PostgreSQL username (not sensitive, but sealed for consistency)
    POSTGRES_USER: "REPLACE_WITH_SEALED_VALUE"

    # PostgreSQL password (must match mycelix-secrets POSTGRES_PASSWORD)
    POSTGRES_PASSWORD: "REPLACE_WITH_SEALED_VALUE"

    # Database name
    POSTGRES_DB: "REPLACE_WITH_SEALED_VALUE"
  template:
    metadata:
      name: postgres-secrets
      namespace: mycelix-testnet
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: testnet
        app.kubernetes.io/component: database
    type: Opaque

---
# =============================================================================
# SEALED SECRET PLACEHOLDER - GRAFANA SECRETS
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-secrets
  namespace: mycelix-testnet
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: testnet
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/managed-by: sealed-secrets
spec:
  encryptedData:
    # Grafana admin username
    admin-user: "REPLACE_WITH_SEALED_VALUE"

    # Grafana admin password (must match mycelix-secrets GRAFANA_PASSWORD)
    admin-password: "REPLACE_WITH_SEALED_VALUE"
  template:
    metadata:
      name: grafana-secrets
      namespace: mycelix-testnet
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/instance: testnet
        app.kubernetes.io/component: monitoring
    type: Opaque

---
