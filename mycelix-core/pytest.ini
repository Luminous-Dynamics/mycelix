[pytest]
# Mycelix Test Configuration
# ==========================
# Separates unit tests (no external deps) from integration tests (require services)

testpaths =
    0TML/tests
    0TML/src/tests

addopts =
    --ignore=8HM2PbkzMb_fG54BnVqyj
    --ignore=production-fl-system
    --ignore=0TML/8HM2PbkzMb_fG54BnVqyj
    --ignore=0TML/test_refactored_bridge.py
    --ignore=.venv
    --ignore=.archive
    --strict-markers
    -v

pythonpath =
    0TML/src
    bindings/python

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# =============================================================================
# TEST MARKERS - Use these to categorize tests
# =============================================================================
markers =
    # Core test categories
    unit: Pure unit tests with no external dependencies (run always)
    integration: Tests requiring external services (Holochain, Redis, etc.)

    # Service-specific integration tests
    holochain: Tests requiring Holochain conductor
    rust: Tests requiring Rust backend/bridge
    pytorch: Tests requiring PyTorch
    tensorflow: Tests requiring TensorFlow
    ethereum: Tests requiring Ethereum/Anvil
    redis: Tests requiring Redis
    postgres: Tests requiring PostgreSQL

    # Performance/load testing
    slow: Long-running tests (>30 seconds)
    long_running: Very long-running tests (>5 minutes, requires RUN_100_ROUND_VALIDATION=1)
    benchmark: Performance benchmarks
    stress: Stress/load tests
    chaos: Chaos engineering resilience tests
    validation: Production validation tests (100-round, etc.)

    # Security testing
    security: Security-related tests
    attack: Byzantine attack simulation tests

    # Feature-specific
    governance: Governance module tests
    identity: Identity/DID module tests
    credits: Credit system tests
    pogq: Proof of Gradient Quality tests

    # CI gates
    smoke: Quick smoke tests for CI
    ci_required: Must pass for CI to succeed

    # E2E testing
    e2e: Full end-to-end tests requiring all services (Holochain, etc.)
    e2e_stub: E2E tests with mocked services (CI-friendly)

# =============================================================================
# FILTERING
# =============================================================================
# Default: run unit tests only (fast CI)
# To run integration tests: pytest -m integration
# To run all tests: pytest -m "unit or integration"
# To run specific service tests: pytest -m holochain
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
