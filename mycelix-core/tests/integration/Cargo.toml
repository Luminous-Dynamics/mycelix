[package]
name = "mycelix-integration-tests"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
# Core libraries
mycelix-core-types = { path = "../../libs/mycelix-core-types" }
rb-bft-consensus = { path = "../../libs/rb-bft-consensus" }
matl-bridge = { path = "../../libs/matl-bridge" }
feldman-dkg = { path = "../../libs/feldman-dkg" }
kvector-zkp = { path = "../../libs/kvector-zkp" }
# fl-aggregator ARCHIVED (Feb 2026) — features ported to mycelix-fl-core + mycelix-fl + mycelix-fl-proofs
# See: mycelix-core/libs/fl-aggregator.archived-v0.1/

# SHA2 for Merkle tree benchmarks
sha2 = "0.10"

# Async runtime
tokio = { version = "1.0", features = ["full", "test-util"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Testing utilities
rand = "0.8"
rand_distr = "0.4"

# Hashing (for gradient commitments)
sha3 = "0.10"

# Array operations
ndarray = "0.16"

[dev-dependencies]
pretty_assertions = "1.4"
