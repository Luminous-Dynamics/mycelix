[pytest]
# Pytest configuration for Mycelix FL Integration Tests

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    byzantine: marks tests involving Byzantine fault tolerance
    stress: marks stress/load tests
    network: marks tests requiring network simulation
    healthcare: marks healthcare-specific scenario tests

# Default options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Timeouts (requires pytest-timeout)
timeout = 300
timeout_method = thread

# Coverage (requires pytest-cov)
# Uncomment to enable by default
# addopts = --cov=. --cov-report=html

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
