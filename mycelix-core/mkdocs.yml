      - Constitution: 01-constitution/README.md
      - Spore Constitution v0.24: architecture/THE MYCELIX SPORE CONSTITUTION (v0.24).md
      - Charters:
          - Epistemic Charter v2.0: architecture/THE EPISTEMIC CHARTER (v2.0).md
          - Governance Charter v1.0: architecture/THE GOVERNANCE CHARTER (v1.0).md
          - Economic Charter v1.0: architecture/THE ECONOMIC CHARTER (v1.0).md
          - Commons Charter v1.0: architecture/THE COMMONS CHARTER (v1.0).md

  - Architecture:
      - Overview: 03-architecture/README.md
      - Visual Diagrams: 03-architecture/visual_diagrams.md
      - Integrated System v5.2: architecture/Mycelix Protocol_ Integrated System Architecture v5.2.md
      - Base Spec v1.0: architecture/mycelix_base_spec.md
      - MATL Architecture: 0TML/docs/06-architecture/matl_architecture.md
      - SDK Design: architecture/Designing Mycelix Protocol SDK.md
      - SDK: 04-sdk/README.md
      - ADRs:
          - Overview: adr/README.md
          - ADR-002 Epistemic Cube: adr/002-epistemic-cube-3d-model.md

  - Zero-TrustML (0TML):
      - Overview: 0TML/docs/README.md
      - Architecture: 0TML/docs/06-architecture/README.md

  - Tutorials:
      - Overview: tutorials/README.md
      - 5-Minute Quick Start: tutorials/quick_start.md
      - MATL Integration: tutorials/matl_integration.md
      - Healthcare FL: tutorials/healthcare_federated_learning.md
      - Interactive Playground: interactive/playground.md

  - Research:
      - Whitepaper: whitepaper/POGQ_WHITEPAPER_OUTLINE.md
      - Section 3 (PoGQ): whitepaper/POGQ_WHITEPAPER_SECTION_3_DRAFT.md
      - Grants: grants/ARCHITECTURE_COMPARISON_FOR_GRANTS.md

  - Operations:
      - Deployment Guide: DEPLOYMENT_GUIDE.md
      - Documentation Versioning: deployment/versioning.md
      - Production Runbook: 0TML/docs/PRODUCTION_OPERATIONS_RUNBOOK.md

  - Roadmap:
      - Overview: 05-roadmap/README.md
      - Improvement Plan (Nov 2025): 05-roadmap/IMPROVEMENT_PLAN_NOV2025.md
      - v5.3 → v6.0: architecture/Mycelix_Roadmap_v5.3_to_v6.0.md
      - MATL 12-Month Plan: roadmap/matl_execution_plan.md

  - About:
      - FAQ: faq.md
      - Version History: VERSION_HISTORY.md
      - Contributing: CONTRIBUTING.md

# Extra CSS
extra_css:
  - stylesheets/extra.css

# Extra JavaScript
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js
  - javascripts/interactive-widgets.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
