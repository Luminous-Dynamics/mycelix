# MkDocs Configuration for Mycelix Protocol Documentation
# Generates a beautiful interactive documentation site

site_name: Mycelix Protocol
site_description: Byzantine-Resistant Federated Learning + Agent-Centric Economy + Constitutional Governance
site_author: Luminous Dynamics
site_url: https://mycelix.net

# Repository
repo_name: Luminous-Dynamics/mycelix
repo_url: https://github.com/Luminous-Dynamics/mycelix
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2025 Luminous Dynamics - Apache 2.0 License

# Configuration
theme:
  name: material

  # Color scheme
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Features
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path  # Breadcrumbs
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate

  # Logo and icons
  logo: Logos/mycelix-icon.svg
  favicon: Logos/mycelix-icon.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# Extensions
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: On this page

  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
      lang:
        - en
      pipeline:
        - stemmer
        - stopWordFilter
        - trimmer
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - tags

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Luminous-Dynamics/mycelix
    - icon: fontawesome/solid/globe
      link: https://mycelix.net

  version:
    provider: mike
    default: latest

  analytics:
    provider: google
    property: G-XXXXXXXXXX  # Replace with actual GA4 ID

  # Announcement bar
  announce:
    text: "🎉 <strong>v5.3 Documentation Live!</strong> New Interactive Playground, Healthcare FL Tutorial, and 45% Byzantine Tolerance visualization 🛡️"
    dismissable: true

# Navigation
nav:
