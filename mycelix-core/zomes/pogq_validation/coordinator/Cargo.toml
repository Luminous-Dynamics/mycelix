[package]
name = "pogq_validation_coordinator"
version = "0.1.0"
edition = "2021"
description = "Coordinator zome for PoGQ (Proof of Gradient Quality) validation"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Holochain 0.7 - Coordinator zomes use hdk
hdk = "0.6"
serde = { version = "1.0", features = ["derive"] }
holochain_serialized_bytes = "0.0.56"

# Local integrity zome
pogq_validation_integrity = { path = "../integrity" }

# WASM compatibility for getrandom (transitive dependencies)
# Do NOT use "js"/"wasm_js" - they pull wasm-bindgen which Holochain's WASM runtime rejects
getrandom_02 = { package = "getrandom", version = "0.2", features = ["custom"] }
getrandom_03 = { package = "getrandom", version = "0.3" }

# Pin rmp and rmp-serde to compatible versions
rmp = "=0.8.14"
rmp-serde = "=1.3.0"

# Pin indexmap to version compatible with Rust 1.81
indexmap = "=2.2.6"

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
panic = 'abort'
