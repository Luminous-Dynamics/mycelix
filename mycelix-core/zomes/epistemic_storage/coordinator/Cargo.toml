[package]
name = "epistemic_storage_coordinator"
version = "0.1.0"
edition = "2021"
description = "UESS DHT Backend - Coordinator zome for epistemic data storage"

[dependencies]
hdk = "0.6"
epistemic_storage_integrity = { path = "../integrity" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# WASM compatibility for getrandom (transitive dependencies)
# Do NOT use "js"/"wasm_js" - they pull wasm-bindgen which Holochain's WASM runtime rejects
getrandom_02 = { package = "getrandom", version = "0.2", features = ["custom"] }
getrandom_03 = { package = "getrandom", version = "0.3" }

# Pin problematic transitive dependencies
rmp = "=0.8.14"
rmp-serde = "=1.3.0"
indexmap = "=2.2.6"

[lib]
crate-type = ["cdylib", "rlib"]

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
panic = 'abort'
