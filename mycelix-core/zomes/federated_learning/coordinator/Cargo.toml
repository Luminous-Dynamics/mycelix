[package]
name = "federated_learning"
version = "0.1.0"
edition = "2021"
description = "Coordinator zome for Mycelix Federated Learning - Byzantine-resistant FL on Holochain"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Holochain 0.6 - Coordinator zomes use hdk
hdk = "0.6.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# WASM compatibility
# getrandom 0.2: "custom" feature lets Holochain provide RNG implementation.
#   Do NOT use "js" - it pulls wasm-bindgen which Holochain's WASM runtime rejects
# getrandom 0.3: custom backend set via .cargo/config.toml (HDK provides __getrandom_v03_custom)
getrandom_02 = { package = "getrandom", version = "0.2", features = ["custom"] }
getrandom_03 = { package = "getrandom", version = "0.3" }

# Pin rmp and rmp-serde to compatible versions (0.8.15+ requires edition2024)
rmp = "=0.8.14"
rmp-serde = "=1.3.0"

# Pin indexmap to version compatible with Rust 1.81
indexmap = "=2.2.6"

# Cryptography for evidence hashing
sha2 = "0.10"

# UUID for mycelix-sdk. Do NOT use "js" feature - it pulls wasm-bindgen.
# "v4" uses getrandom which is handled by the custom backend.
uuid = { version = "1.0", features = ["v4", "rng-getrandom"] }

# Reference to integrity zome for types
federated_learning_integrity = { path = "../integrity" }

# Mycelix SDK for MATL, Epistemic, and Bridge protocols
mycelix-sdk = { path = "../../../../mycelix-workspace/sdk" }

# Mycelix FL for decentralized aggregation pipeline
mycelix-fl = { path = "../../../../mycelix-workspace/crates/mycelix-fl", features = ["shapley", "replay", "pogq", "phi-series"] }

[features]
default = []
# Enable zkSTARK proof verification (simulation mode).
# Without this feature, submit_compressed_gradient rejects all proofs (fail-closed).
zkstark = []
