[package]
name = "causal_contribution"
version = "0.1.0"
edition = "2021"
description = "Coordinator zome for Causal Contribution - ZK-verified contribution tracking"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Holochain 0.6 - Coordinator zomes use hdk
hdk = "0.6.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# Enable wasm support for getrandom (transitive dependencies)
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom = { version = "0.3", features = ["wasm_js"] }

# Reference to integrity zome for types
causal_contribution_integrity = { path = "../integrity" }

# Reference to reputation zome for cross-zome calls
civitas_reputation_integrity = { path = "../../civitas_reputation/integrity" }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
panic = 'abort'
