# Prometheus configuration for zkSTARK proof service monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'fl-aggregator-proofs'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Proof service metrics
  - job_name: 'proof-service'
    static_configs:
      - targets: ['proof-service:9090']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    metric_relabel_configs:
      # Add service label
      - source_labels: []
        target_label: service
        replacement: proof-service

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Optional: Node exporter for system metrics
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
