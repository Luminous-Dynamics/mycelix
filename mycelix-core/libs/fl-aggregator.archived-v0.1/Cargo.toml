[package]
name = "fl-aggregator"
version = "0.1.0"
edition = "2021"
description = "High-performance Byzantine-resistant federated learning aggregator"
license = "MIT OR Apache-2.0"
repository = "https://github.com/Luminous-Dynamics/Mycelix-Core"
keywords = ["federated-learning", "byzantine", "aggregation", "machine-learning"]
categories = ["algorithms", "science"]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
python = ["pyo3", "numpy"]
http-api = ["axum", "tower", "tower-http", "base64"]
holochain = ["tokio-tungstenite", "rmp-serde", "base64", "futures-util", "url"]
privacy = ["aes-gcm"]
storage-local = []
storage-postgres = ["sqlx"]
identity = ["reqwest"]
governance = []
proofs = ["winterfell", "blake3"]
kvector-zkp = ["dep:kvector-zkp"]
proofs-pq = ["proofs", "pqcrypto-dilithium", "pqcrypto-traits"]
proofs-compressed = ["proofs", "zstd"]
proofs-kyber = ["proofs", "pqcrypto-kyber", "pqcrypto-traits"]
proofs-threshold = ["proofs", "frost-ed25519"]
proofs-wasm = ["proofs", "wasm-bindgen", "web-sys", "js-sys", "wasm-bindgen-futures"]
proofs-telemetry = ["proofs", "opentelemetry", "opentelemetry-otlp", "opentelemetry_sdk"]
proofs-streaming = ["proofs", "tokio-stream"]
proofs-anchoring = ["proofs", "reqwest"]
proofs-hsm = ["proofs", "reqwest"]
# GPU acceleration features
proofs-gpu-wgpu = ["proofs", "wgpu", "pollster", "bytemuck"]
proofs-gpu-cuda = ["proofs"]    # CUDA backend (NVIDIA only) - not yet implemented
proofs-gpu-metal = ["proofs"]   # Metal backend (Apple only) - not yet implemented
proofs-gpu-opencl = ["proofs"]  # OpenCL backend (cross-vendor) - not yet implemented
# Ethereum integration for payment distribution and anchoring
ethereum = ["ethers", "ethers-signers"]
proofs-parallel = ["proofs", "rayon"]
proofs-full = [
    "proofs-pq", "proofs-compressed", "proofs-kyber",
    "proofs-threshold", "proofs-telemetry", "proofs-streaming", "proofs-anchoring",
    "proofs-parallel"
]
proof-cli = ["proofs", "clap"]
proof-debugger = ["proofs", "clap", "colored", "tabled"]
proof-explorer = ["proofs", "ratatui", "crossterm"]
proofs-grpc = ["proofs", "tonic", "prost", "prost-types", "tokio-stream"]
# gRPC API for FL coordination (node registration, submission, streaming events)
grpc = ["tonic", "prost", "prost-types", "tokio-stream"]
# Prometheus metrics export (optional - avoids dependency for users who don't need it)
prometheus = ["dep:prometheus", "dep:once_cell"]
# WebAssembly build for browser-based FL (fully decentralized, no server)
wasm = ["wasm-bindgen", "web-sys", "js-sys", "wasm-bindgen-futures", "serde-wasm-bindgen", "console_error_panic_hook"]
bench-fixtures = []

[dependencies]
# Core
ndarray = "0.16"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Shared FL algorithms (single source of truth)
mycelix-fl-core = { path = "../../../mycelix-workspace/crates/mycelix-fl-core" }

# Async runtime
tokio = { version = "1.43", features = ["full"] }
async-trait = "0.1"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }

# Cryptography (for signature verification)
sha2 = "0.10"
ed25519-dalek = { version = "2.1", features = ["serde"] }
hmac = "0.12"
pbkdf2 = { version = "0.12", features = ["simple"] }

# Time
chrono = { version = "0.4", features = ["serde"] }
humantime = "2.1"

# Python bindings (optional)
pyo3 = { version = "0.23", features = ["extension-module"], optional = true }
numpy = { version = "0.23", optional = true }

# HTTP API (optional)
axum = { version = "0.8", optional = true }
tower = { version = "0.5", optional = true }
tower-http = { version = "0.6", features = ["cors", "trace"], optional = true }

# Holochain integration (optional)
tokio-tungstenite = { version = "0.26", optional = true }
rmp-serde = { version = "1.3", optional = true }
base64 = { version = "0.22", optional = true }
futures-util = { version = "0.3", optional = true }
url = { version = "2.5", optional = true }

# Privacy (optional)
aes-gcm = { version = "0.10", optional = true }

# GDPR Erasure (P2-05) - always enabled for privacy compliance
chacha20poly1305 = "0.10"
parking_lot = "0.12"
sha3 = "0.10"
getrandom = "0.2"
hex = "0.4"

# Random number generation (used by attack simulator)
rand = "0.8"
rand_distr = "0.4"

# Storage backends (optional)
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres"], optional = true }

# Identity (optional)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }

# zkSTARK proofs (optional)
winterfell = { version = "0.10", optional = true }
blake3 = { version = "1.5", optional = true }

# K-Vector ZKP for trust verification (optional)
kvector-zkp = { path = "../kvector-zkp", optional = true }

# Post-quantum cryptography (optional)
pqcrypto-dilithium = { version = "0.5", optional = true }
pqcrypto-kyber = { version = "0.8", optional = true }
pqcrypto-traits = { version = "0.3", optional = true }

# Threshold signatures (optional)
frost-ed25519 = { version = "2.1", optional = true }

# Compression (optional)
zstd = { version = "0.13", optional = true }

# WASM (optional)
wasm-bindgen = { version = "0.2", optional = true }
web-sys = { version = "0.3", features = ["Window", "Performance", "console"], optional = true }
js-sys = { version = "0.3", optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }

# Telemetry (optional)
opentelemetry = { version = "0.27", optional = true }
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"], optional = true }
opentelemetry-otlp = { version = "0.27", optional = true }

# Streaming
async-stream = "0.3"
tokio-stream = { version = "0.1", optional = true }

# Hashing (non-cryptographic)
# WARNING: MD5 is used ONLY for display/debugging short hashes, NOT for security.
# It generates abbreviated identifiers for logs/UI. For cryptographic hashing, use sha2/blake3.
# See: ethereum/bridge.rs:267, coordinator.rs:651,899
md5 = "0.7"

# Parallel processing (optional)
rayon = { version = "1.10", optional = true }

# CLI
clap = { version = "4.5", features = ["derive"], optional = true }
colored = { version = "2.1", optional = true }
tabled = { version = "0.17", optional = true }

# TUI (optional)
ratatui = { version = "0.29", optional = true }
crossterm = { version = "0.28", optional = true }

# GPU acceleration (optional)
wgpu = { version = "23.0", optional = true }
pollster = { version = "0.4", optional = true }
bytemuck = { version = "1.21", features = ["derive"], optional = true }

# Ethereum integration (optional)
ethers = { version = "2.0", features = ["abigen", "ws", "rustls"], optional = true }
ethers-signers = { version = "2.0", optional = true }

# Prometheus metrics (optional)
prometheus = { version = "0.13", optional = true }
once_cell = { version = "1.20", optional = true }

# gRPC (optional)
tonic = { version = "0.12", optional = true }
prost = { version = "0.13", optional = true }
prost-types = { version = "0.13", optional = true }

[dev-dependencies]
tempfile = "3.14"
criterion = { version = "0.5", features = ["html_reports"] }
tokio-test = "0.4"
approx = "0.5"
proptest = "1.5"
wiremock = "0.6"

[[bench]]
name = "aggregation_bench"
harness = false

[[bench]]
name = "proof_bench"
harness = false
required-features = ["proofs"]

[[bin]]
name = "fl-demo"
path = "src/bin/fl_demo.rs"

[[bin]]
name = "fl-server"
path = "src/bin/server.rs"
required-features = ["http-api"]

[[bin]]
name = "proof-cli"
path = "src/bin/proof_cli.rs"
required-features = ["proof-cli"]

[[bin]]
name = "proof-debugger"
path = "src/bin/proof_debugger.rs"
required-features = ["proof-debugger"]

[[bin]]
name = "proof-explorer"
path = "src/bin/proof_explorer.rs"
required-features = ["proof-explorer"]

[[bin]]
name = "integrated-server"
path = "src/bin/integrated_server.rs"
required-features = ["http-api"]
