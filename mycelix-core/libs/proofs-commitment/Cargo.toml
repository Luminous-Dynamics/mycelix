[package]
name = "proofs-commitment"
version = "0.1.0"
edition = "2021"
authors = ["Mycelix Network"]
description = "Shared commitment schemes for Mycelix ZK proof systems"
license = "AGPL-3.0-or-later"
repository = "https://github.com/luminous-dynamics/Mycelix-Core"

[features]
default = []
# Enable Winterfell field element integration
winterfell = ["dep:winterfell"]

[dependencies]
sha3 = "0.10"
thiserror = "2.0"

# Optional: Winterfell integration for field element commitments
winterfell = { version = "0.13", optional = true }

[dev-dependencies]
rand = "0.8"
