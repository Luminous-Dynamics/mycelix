[package]
name = "luminous-nix"
version = "0.5.0"
edition = "2021"
description = "Natural language interface for NixOS - powered by Symthaea HDC"
license = "AGPL-3.0-or-later"
repository = "https://github.com/luminous-dynamics/mycelix"
readme = "README.md"
keywords = ["nix", "nixos", "cli", "natural-language", "hdc"]
categories = ["command-line-utilities", "development-tools"]

[lib]
name = "luminous_nix"
path = "src/lib.rs"

[[bin]]
name = "ask-nix"
path = "src/main.rs"

[features]
default = ["color"]
color = ["colored"]

[dependencies]
# Core Mycelix types with HDC AssociativeLearner
mycelix-core-types = { path = "../mycelix-core-types", features = ["serde"] }

# CLI framework
clap = { version = "4.5", features = ["derive", "env", "wrap_help"] }
clap_complete = "4.5"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Serialization (required)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Output formatting
tabled = "0.18"
colored = { version = "2.1", optional = true }

# Async runtime (for parallel command execution)
tokio = { version = "1", features = ["rt-multi-thread", "process", "time", "fs", "macros"] }

# User data directories
directories = "5.0"

# Regex for pattern matching fallback
regex = "1.10"

[dev-dependencies]
tempfile = "3.10"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "intent_classification"
harness = false
