[package]
name = "mycelix-core"
version = "0.1.0"
edition = "2021"
authors = ["Mycelix Team"]
description = "High-performance Rust components for Mycelix Federated Learning"

[lib]
name = "mycelix_core"
crate-type = ["cdylib", "rlib"]

[dependencies]
# Async runtime (reduced features for portability)
tokio = { version = "1.51", default-features = false, features = ["rt", "sync"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography
kyber = "0.7"
dilithium = "0.2.0-alpha.3"
x25519-dalek = "2.0"
ed25519-dalek = "2.1"
sha2 = "0.10"

# Math/ML
ndarray = "0.15"
num-traits = "0.2"
getrandom = { version = "0.2", features = ["js"] }

# FFI
pyo3 = { version = "0.20", features = ["extension-module"], optional = true }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

[features]
default = []
python = ["pyo3"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
