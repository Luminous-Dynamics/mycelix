---
# Mycelix Desktop - Holochain Conductor Configuration (Second Instance)
# For P2P networking tests
# Updated for Holochain 0.5.6 format

# Tracing and logging
tracing_override: null

# Data directory (different from first conductor)
data_root_path: .holochain-2

# Device seed (optional, for development)
device_seed_lair_tag: null
danger_generate_throwaway_device_seed: false

# Keystore configuration
keystore:
  type: lair_server_in_proc
  lair_root: .holochain-2/ks

# DPKI configuration
dpki:
  dna_path: null
  network_seed: ''
  allow_throwaway_random_dpki_agent_key: false
  no_dpki: true

# Admin interfaces (different port from first conductor)
admin_interfaces:
  - driver:
      type: websocket
      port: 8889  # Different from first conductor (8888)
      allowed_origins: '*'

# Network configuration (same bootstrap for peer discovery)
network:
  bootstrap_url: https://dev-test-bootstrap2.holochain.org/
  signal_url: wss://dev-test-bootstrap2.holochain.org/
  webrtc_config: null
  target_arc_factor: 1
  advanced: null

# Database sync strategy
db_sync_strategy: Fast

# Tuning params (optional)
tuning_params: null

# Tracing scope
tracing_scope: null
