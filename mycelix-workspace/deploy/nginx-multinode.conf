# Mycelix Multi-Node Nginx Configuration
#
# Load-balances WebSocket connections across 3 Holochain conductors.
# Uses ip_hash for sticky sessions (Holochain WS connections are stateful).

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws:10m rate=10r/s;

# Upstream: Observatory (single instance)
upstream observatory_backend {
    server observatory:3000;
}

# Upstream: 3 conductor app interfaces with sticky sessions
upstream conductor_app {
    ip_hash;  # Sticky sessions — same client always hits same conductor
    server conductor:8888;
    server conductor2:8888;
    server conductor3:8888;
}

# Upstream: Admin (node 1 only — admin ops should target a specific node)
upstream conductor_admin {
    server conductor:4444;
}

# --- HTTPS server: Observatory dashboard + conductor WebSocket ---
server {
    listen 443 ssl http2;
    server_name mycelix.net *.mycelix.net;

    ssl_certificate     /etc/ssl/certs/mycelix.crt;
    ssl_certificate_key /etc/ssl/private/mycelix.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://*.mycelix.net ws://localhost:*; img-src 'self' data:;" always;

    # Observatory dashboard
    location / {
        proxy_pass http://observatory_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=api burst=50 nodelay;
    }

    # Conductor WebSocket — load-balanced across 3 nodes
    location /ws {
        proxy_pass http://conductor_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        limit_req zone=ws burst=20 nodelay;
    }

    # Per-node WebSocket endpoints (for debugging/targeted access)
    location /ws/node1 {
        proxy_pass http://conductor:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }
    location /ws/node2 {
        proxy_pass http://conductor2:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }
    location /ws/node3 {
        proxy_pass http://conductor3:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # Health endpoint — shows which nodes are reachable
    location /health {
        default_type application/json;
        return 200 '{"nodes":3,"load_balancing":"ip_hash","status":"ok"}';
    }
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name mycelix.net *.mycelix.net;
    return 301 https://$host$request_uri;
}

# Admin API (port 4445, node 1 only, restricted)
server {
    listen 4445 ssl;
    server_name mycelix.net;
    ssl_certificate     /etc/ssl/certs/mycelix.crt;
    ssl_certificate_key /etc/ssl/private/mycelix.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://conductor_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
