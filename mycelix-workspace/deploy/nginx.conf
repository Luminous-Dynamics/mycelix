# Mycelix Production Nginx Configuration
#
# Provides:
#   - HTTPS termination for Observatory dashboard (port 443)
#   - WSS-to-WS proxy for Holochain conductor app interface
#   - Optional admin API proxy on port 4445 (restricted)
#   - Security headers (HSTS, X-Frame-Options, CSP, etc.)
#
# TLS certificates: replace placeholder paths with real certs.
# For Let's Encrypt, use certbot or mount certs from the host.

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws:10m rate=10r/s;

# Upstream definitions — Docker service names resolve via docker-compose networking
upstream observatory_backend {
    server observatory:3000;
}

upstream conductor_app {
    server conductor:8888;
}

upstream conductor_admin {
    server conductor:4444;
}

# --- HTTPS server: Observatory dashboard + conductor WebSocket ---
server {
    listen 443 ssl http2;
    server_name mycelix.net *.mycelix.net;

    # TLS configuration — replace with real certificate paths.
    # For Let's Encrypt: /etc/letsencrypt/live/mycelix.net/fullchain.pem
    ssl_certificate     /etc/ssl/certs/mycelix.crt;
    ssl_certificate_key /etc/ssl/private/mycelix.key;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://*.mycelix.net ws://localhost:*; img-src 'self' data:;" always;

    # --- Observatory dashboard (SvelteKit) ---
    location / {
        proxy_pass http://observatory_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=api burst=50 nodelay;
    }

    # --- Holochain App WebSocket (WSS -> WS proxy) ---
    # Clients connect to wss://mycelix.net/ws and nginx upgrades to WebSocket,
    # forwarding to the conductor's plain WS on port 8888.
    location /ws {
        proxy_pass http://conductor_app;
        proxy_http_version 1.1;

        # WebSocket upgrade headers — required for WS protocol switch
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections are long-lived; increase timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        limit_req zone=ws burst=20 nodelay;
    }
}

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    server_name mycelix.net *.mycelix.net;
    return 301 https://$host$request_uri;
}

# --- Admin API (port 4445, restricted access) ---
# This server block exposes the conductor admin interface on a separate port.
# In production, restrict access via firewall rules or IP allowlists.
# Do NOT expose this to the public internet.
server {
    listen 4445 ssl;
    server_name mycelix.net;

    ssl_certificate     /etc/ssl/certs/mycelix.crt;
    ssl_certificate_key /etc/ssl/private/mycelix.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Restrict to internal/admin IPs only
    # Uncomment and set your admin IP ranges:
    # allow 10.0.0.0/8;
    # allow 172.16.0.0/12;
    # deny all;

    location / {
        proxy_pass http://conductor_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
