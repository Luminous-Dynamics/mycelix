apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mycelix-mail

resources:
  - namespace.yaml
  - backend-deployment.yaml
  - frontend-deployment.yaml
  - postgres.yaml
  - redis.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: mycelix-mail
  app.kubernetes.io/managed-by: kustomize

configMapGenerator:
  - name: backend-config
    literals:
      - HOST=0.0.0.0
      - PORT=3001
      - RUST_LOG=mycelix_mail=info

secretGenerator:
  - name: backend-secrets
    literals:
      - database-url=postgres://mycelix:CHANGE_ME@postgres:5432/mycelix_mail
      - jwt-secret=CHANGE_ME_IN_PRODUCTION
    type: Opaque
