---
manifest_version: "0"
name: mycelix_mail
description: |
  Mycelix Mail - Decentralized secure email on Holochain.
  Includes identity DNA for DID management, MFA, and multi-device sync.
roles:
  - name: main
    provisioning:
      strategy: create
      deferred: false
    dna:
      path: ./dna/mycelix_mail_dna.dna
      modifiers:
        network_seed: ~
        properties: ~
      clone_limit: 0
  - name: identity
    provisioning:
      strategy: create
      deferred: false
    dna:
      path: ../../mycelix-identity/dna/mycelix_identity_dna.dna
      modifiers:
        network_seed: ~
        properties: ~
      clone_limit: 0
