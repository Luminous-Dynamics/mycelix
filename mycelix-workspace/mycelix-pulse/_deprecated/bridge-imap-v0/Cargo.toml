[package]
name = "mycelix-mail-bridge"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "IMAP/SMTP bridge agent for Mycelix Mail — relays legacy email to/from Holochain"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# IMAP (sync — run in spawn_blocking)
imap = "2"
native-tls = "0.2"

# SMTP
lettre = { version = "0.11", features = ["tokio1-native-tls", "builder"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"

# WebSocket client for Holochain conductor
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
futures-util = "0.3"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Config
toml = "0.8"

# HTTP client for OAuth token exchange
reqwest = { version = "0.12", features = ["json"] }
base64 = "0.22"

# Error handling
anyhow = "1"
thiserror = "2"

# Time
chrono = { version = "0.4", features = ["serde"] }
