apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycelix-frontend
  namespace: mycelix-mail
  labels:
    app: mycelix-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mycelix-frontend
  template:
    metadata:
      labels:
        app: mycelix-frontend
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: frontend
          image: mycelix/mail-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: VITE_API_URL
              value: "/api"
            - name: VITE_WS_URL
              value: "wss://api.mycelix.mail/ws"
            - name: VITE_HOLOCHAIN_URL
              value: "wss://holo.mycelix.mail"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mycelix-frontend
  namespace: mycelix-mail
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app: mycelix-frontend
