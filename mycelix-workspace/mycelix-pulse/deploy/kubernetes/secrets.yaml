# ==========================================================================
# Mycelix Pulse — Kubernetes Secrets
#
# DO NOT deploy this file with placeholder values. Use one of:
#   1. Sealed Secrets:  kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#   2. External Secrets Operator: reference AWS SM / HashiCorp Vault
#   3. Helm values with --set flags from CI/CD
#
# Generate strong secrets:
#   openssl rand -base64 48   (for jwt-secret, credential-encryption-secret)
#   openssl rand -hex 32      (for database passwords)
# ==========================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mycelix-secrets
  namespace: mycelix-mail
type: Opaque
stringData:
  database-url: "${DATABASE_URL}"
  redis-url: "${REDIS_URL}"
  jwt-secret: "${JWT_SECRET}"
  credential-encryption-secret: "${CREDENTIAL_ENCRYPTION_SECRET}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mycelix-config
  namespace: mycelix-mail
data:
  config.toml: |
    [server]
    host = "0.0.0.0"
    port = 8080

    [database]
    max_connections = 20
    min_connections = 5
    connect_timeout_secs = 10

    [redis]
    default_ttl_secs = 300

    [rate_limit]
    requests_per_minute = 100
    burst_size = 20

    [cors]
    allowed_origins = ["https://mycelix.mail"]

    [trust]
    default_score = 0.5
    cache_ttl_secs = 60

    [holochain]
    connection_timeout_secs = 30

    [ml]
    enabled = true
    model = "llama3.2"
