[package]
name = "mycelix-pulse-desktop"
version = "0.1.0"
description = "Mycelix Pulse desktop shell"
authors = ["Mycelix Team"]
license = "AGPL-3.0-or-later"
repository = "https://github.com/mycelix/mycelix-mail"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
tauri = { version = "2.0" }
tauri-plugin-shell = "2.0"
tauri-plugin-dialog = "2.0"
tauri-plugin-notification = "2.0"
tauri-plugin-fs = "2.0"
tauri-plugin-os = "2.0"
tauri-plugin-process = "2.0"
tauri-plugin-deep-link = "2.0"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"
env_logger = "0.10"

[target.'cfg(target_os = "linux")'.dependencies]
webkit2gtk = "2.0"

[features]
default = []
# custom-protocol bundles dist into binary — disabled because webkit2gtk
# has a flex layout bug with bundled content. Using devUrl to localhost:8117 instead.
# Re-enable once webkit2gtk fixes the viewport/flex issue.
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
