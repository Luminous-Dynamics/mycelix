[package]
name = "trust_filter"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

# Empty workspace to prevent being included in parent workspace
[workspace]

[dependencies]
# Holochain 0.6 - Coordinator zomes use hdk
hdk = "0.6.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
mycelix_mail_integrity = { path = "../../integrity" }

# Mycelix SDK for MATL trust scoring and Bridge messaging
mycelix-sdk = { path = "../../../../../mycelix-workspace/sdk" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
overflow-checks = true
