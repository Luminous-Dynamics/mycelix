[package]
name = "mycelix-mail-backend"
version = "0.1.0"
edition = "2021"
authors = ["Luminous Dynamics"]
description = "Axum-based backend for Mycelix-Mail - connects React frontend to Holochain DNA"
license = "AGPL-3.0-or-later"
repository = "https://github.com/Luminous-Dynamics/Mycelix-Mail"

[lib]
name = "mycelix_mail_backend"
path = "src/lib.rs"

[[bin]]
name = "mycelix-mail-backend"
path = "src/main.rs"

[dependencies]
# Web framework
axum = { version = "0.7", features = ["ws", "macros"] }
axum-extra = { version = "0.9", features = ["typed-header"] }
tower = { version = "0.4", features = ["util", "timeout", "limit"] }
governor = "0.6"  # Rate limiting
tower-http = { version = "0.5", features = ["cors", "trace", "compression-gzip"] }

# Async runtime
tokio = { version = "1", features = ["full"] }
futures = "0.3"

# Holochain client
holochain_client = "0.7"
holochain_types = "0.5"
holochain_zome_types = "0.5"
holochain_keystore = "0.5"  # For lair keystore integration

# Shared types from integrity zome
mycelix_mail_integrity = { path = "../dna/integrity" }

# Identity client for DID resolution and credential verification
mycelix-identity-client = { path = "../../../mycelix-core/libs/identity-client/rust" }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Authentication
jsonwebtoken = "9"
argon2 = "0.5"  # Password hashing

# Encryption
chacha20poly1305 = "0.10"  # AEAD symmetric encryption
x25519-dalek = { version = "2", features = ["static_secrets"] }  # Key exchange
ed25519-dalek = "2.1"  # Ed25519 signature verification
rand = "0.8"  # Secure random
sha2 = "0.10"  # Key derivation
hkdf = "0.12"
pqcrypto-kyber = "0.8"
pqcrypto-dilithium = "0.5"
pqcrypto-traits = "0.3"
hex = "0.4"  # Hex encoding for DID parsing
bs58 = "0.5"  # Base58 encoding for did:key parsing

# Caching
moka = { version = "0.12", features = ["future"] }  # Async cache

# Error handling
thiserror = "1"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Configuration
dotenvy = "0.15"

# Time
chrono = { version = "0.4", features = ["serde"] }

# UUID for session IDs
uuid = { version = "1", features = ["v4", "serde"] }

# Lazy statics for credential store
once_cell = "1.21"

# Base64 encoding
base64 = "0.22"

# URL encoding
urlencoding = "2.1"

# IPFS client and 0TML ZK verification service
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls", "blocking"] }
cid = "0.11"  # Content Identifier for IPFS

# API Documentation
utoipa = { version = "4", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "7", features = ["axum"] }

# Local persistence (JSON file-based, no dependency conflicts)

[dev-dependencies]
tokio-test = "0.4"
tower = { version = "0.4", features = ["util"] }
hyper = { version = "1", features = ["full"] }

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
