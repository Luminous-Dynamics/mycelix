# Mycelix Mail - Holochain Conductor Configuration
# =================================================

---
environment_path: /data
keystore:
  type: lair_server_in_proc
admin_interfaces:
  - driver:
      type: websocket
      port: 8889
      allowed_origins: "*"
network:
  transport_pool:
    - type: webrtc
      signal_url: wss://signal.holo.host
  bootstrap_service: https://bootstrap.holo.host
  tuning_params:
    gossip_loop_iteration_delay_ms: 1000
    gossip_outbound_target_mbps: 10.0
    gossip_inbound_target_mbps: 10.0
    gossip_historic_outbound_target_mbps: 10.0
    gossip_historic_inbound_target_mbps: 10.0
    gossip_peer_on_success_next_gossip_delay_ms: 60000
    gossip_peer_on_error_next_gossip_delay_ms: 300000
    gossip_local_sync_delay_ms: 60000
    gossip_redundancy_target: 50
    gossip_round_timeout_ms: 60000
    gossip_dynamic_arcs: true
db_sync_strategy: Fast
