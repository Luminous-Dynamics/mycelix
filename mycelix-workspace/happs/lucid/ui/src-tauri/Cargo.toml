[workspace]

[package]
name = "lucid-desktop"
version = "0.1.0"
description = "LUCID - Living Unified Consciousness for Insight & Discovery"
authors = ["Mycelix"]
edition = "2021"
license = "MIT"
repository = "https://github.com/mycelix/lucid-happ"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "devtools"] }
tauri-plugin-shell = "2"
tauri-plugin-notification = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-clipboard-manager = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Symthaea integration (direct paths — avoids symlink chain that breaks Cargo path resolution)
lucid-symthaea = { path = "../../../../libs/lucid-symthaea", features = ["symthaea"] }
symthaea = { path = "../../../../../symthaea" }

# Async runtime for Symthaea
tokio = { version = "1", features = ["rt-multi-thread", "sync", "net"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Tracing for diagnostics
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Local API server for browser extension
axum = "0.7"
tower-http = { version = "0.5", features = ["cors"] }
uuid = { version = "1", features = ["v4"] }

# Zero-Knowledge Proof integration
lucid-zkp = { path = "../../../../libs/lucid-zkp" }
hex = "0.4"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
# Symthaea with neural bridge for high-quality embeddings
neural-bridge = ["symthaea/neural-bridge"]
