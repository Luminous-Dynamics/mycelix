name: Epistemic Markets CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Rust Zomes
  # ============================================================================
  rust-check:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Holochain
        uses: cachix/cachix-action@v13
        with:
          name: holochain-ci
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check Formatting
        run: |
          nix develop --command cargo fmt --all -- --check

      - name: Clippy Lints
        run: |
          nix develop --command cargo clippy --all-targets --all-features -- -D warnings

      - name: Build Zomes
        run: |
          nix develop --command cargo build --release --target wasm32-unknown-unknown

  rust-test:
    name: Rust Unit Tests
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Holochain
        uses: cachix/cachix-action@v13
        with:
          name: holochain-ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Unit Tests
        run: |
          nix develop --command cargo test --all

  # ============================================================================
  # TypeScript SDK
  # ============================================================================
  typescript-check:
    name: TypeScript Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-ts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk-ts/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  typescript-test:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    needs: typescript-check
    defaults:
      run:
        working-directory: sdk-ts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk-ts/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  # ============================================================================
  # Simulations
  # ============================================================================
  simulations:
    name: Run Market Simulations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tsx
        run: npm install -g tsx

      - name: Run Simulations
        run: |
          tsx simulations/market_simulation.ts

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-test, typescript-test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Holochain
        uses: cachix/cachix-action@v13
        with:
          name: holochain-ci
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build DNA
        run: |
          nix develop --command bash -c "
            cargo build --release --target wasm32-unknown-unknown
            hc dna pack workdir
            hc app pack workdir
          "

      - name: Install Test Dependencies
        run: |
          cd tests
          npm ci

      - name: Run Integration Tests
        run: |
          cd tests
          npm test
        env:
          CONDUCTOR_TIMEOUT: 120000

  # ============================================================================
  # Documentation
  # ============================================================================
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Documentation Links
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          args: --verbose --no-progress 'docs/**/*.md' 'README.md' '*.md' --exclude-path 'node_modules'
          fail: false  # Warn but don't fail on broken links

      - name: Check Required Docs Exist
        run: |
          required_docs=(
            "README.md"
            "MANIFESTO.md"
            "GETTING_STARTED.md"
            "CONTRIBUTING.md"
            "LICENSE"
            "CHANGELOG.md"
            "docs/DESIGN_PRINCIPLES.md"
            "docs/GOVERNANCE.md"
            "docs/SECURITY.md"
            "docs/API_REFERENCE.md"
          )

          missing=0
          for doc in "${required_docs[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "Missing required documentation: $doc"
              missing=1
            fi
          done

          if [ $missing -eq 1 ]; then
            exit 1
          fi

          echo "All required documentation present!"

  # ============================================================================
  # Security
  # ============================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cargo Audit
        run: |
          nix develop --command cargo audit

      - name: Check for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.sha }}

  # ============================================================================
  # Release
  # ============================================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [rust-test, typescript-test, integration, docs-check, security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Holochain
        uses: cachix/cachix-action@v13
        with:
          name: holochain-ci
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Release Artifacts
        run: |
          nix develop --command bash -c "
            # Build WASM zomes
            cargo build --release --target wasm32-unknown-unknown

            # Pack DNA and hApp
            hc dna pack workdir -o epistemic-markets.dna
            hc app pack workdir -o epistemic-markets.happ
          "

      - name: Build SDK
        run: |
          cd sdk-ts
          npm ci
          npm run build
          npm pack

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            epistemic-markets.dna
            epistemic-markets.happ
            sdk-ts/*.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
