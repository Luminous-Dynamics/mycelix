---
# Mycelix Resilience Kit — 8-DNA hApp Bundle
#
# Subset of the unified 10-DNA manifest optimized for community resilience:
# TEND mutual credit, food tracking, mutual aid, emergency comms,
# water systems, supplies, household/hearth, knowledge commons.
#
# Omits: personal (sovereign vault), commons_land (property/housing),
#        attribution, health — these can be added later.
#
# Usage:
#   just resilience-build    (builds 8 DNAs + packs this manifest)
#   hc app pack . -o mycelix-resilience.happ

manifest_version: "0"
name: mycelix-resilience
description: |
  Community resilience infrastructure — 8-DNA subset for deployment
  in resource-constrained environments.

  Included:
  - Identity: DID registry, MFA, trust credentials, recovery
  - Finance: TEND mutual credit, payments, currency mint
  - Commons Care: Mutual aid, food production, care, transport
  - Civic: Emergency comms, justice, media
  - Governance: Proposals, voting, DKG, constitution (TEND authorization)
  - Hearth: Kinship, household coordination, emergency plans
  - Knowledge: Claims, verification, community knowledge base
  - Supply Chain: Provenance tracking, inventory management

  Enables cross-cluster calls between all roles via OtherRole dispatch.

roles:
  - name: identity
    provisioning:
      strategy: create
      deferred: false
    dna:
      path: ./identity/dna/mycelix_identity_dna.dna
      modifiers:
        network_seed: ~
        properties: ~
      clone_limit: 0

  - name: finance
    provisioning:
      strategy: create
      deferred: false
    dna:
      path: ./finance/dna/mycelix_finance.dna
      modifiers:
        network_seed: ~
        properties: ~
      clone_limit: 0

  - name: commons_care
    provisioning:
      strategy: create
      deferred: false
    dna:
      path: ./commons/dna/mycelix_commons_care.dna
      modifiers:
        network_seed: ~
        properties: ~
      clone_limit: 0

  - name: civic
    provisioning:
      strategy: create
      deferred: false
    dna:
      path: ./civic/dna/mycelix_civic.dna
