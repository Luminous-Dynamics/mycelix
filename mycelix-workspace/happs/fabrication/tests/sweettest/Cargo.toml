[package]
name = "fabrication-sweettest"
version = "0.1.0"
edition = "2021"
description = "Sweettest integration tests for fabrication hApp"
publish = false
autotests = false

[lib]
path = "lib.rs"

[dependencies]
holochain = { version = "0.6", features = ["test_utils", "sweettest"] }
holochain_types = "0.6"
hdk = "0.6"
hdi = "0.7"
tokio = { version = "1", features = ["full", "test-util"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"

[[test]]
name = "sweettest_designs"
path = "sweettest_designs.rs"

[[test]]
name = "sweettest_verification"
path = "sweettest_verification.rs"

[[test]]
name = "sweettest_bridge"
path = "sweettest_bridge.rs"

[[test]]
name = "sweettest_printers"
path = "sweettest_printers.rs"

[[test]]
name = "sweettest_prints"
path = "sweettest_prints.rs"

[[test]]
name = "sweettest_materials"
path = "sweettest_materials.rs"

[[test]]
name = "sweettest_symthaea"
path = "sweettest_symthaea.rs"
