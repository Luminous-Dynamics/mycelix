[workspace]
members = [
    "crates/fabrication_common",
    "zomes/designs/integrity",
    "zomes/designs/coordinator",
    "zomes/printers/integrity",
    "zomes/printers/coordinator",
    "zomes/prints/integrity",
    "zomes/prints/coordinator",
    "zomes/materials/integrity",
    "zomes/materials/coordinator",
    "zomes/verification/integrity",
    "zomes/verification/coordinator",
    "zomes/bridge/integrity",
    "zomes/bridge/coordinator",
    "zomes/symthaea/integrity",
    "zomes/symthaea/coordinator",
]
exclude = ["tests/sweettest"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
repository = "https://github.com/Luminous-Dynamics/mycelix-fabrication"

[workspace.dependencies]
# Holochain 0.6 - Updated 2026-01-09 per official compatibility table
hdk = "0.6.0"
hdi = "0.7.0"
holochain_integrity_types = "0.6.0"
holochain_serialized_bytes = "0.0.56"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# WASM compatibility - getrandom 0.3 with custom backend (HDK provides __getrandom_v03_custom)
# NOTE: Do NOT use features = ["js"] or ["wasm_js"] - they pull in wasm-bindgen
# which is incompatible with Holochain's WASM runtime.
getrandom_03 = { package = "getrandom", version = "0.3" }

# Mycelix SDK (workspace-local)
mycelix-sdk = { path = "../../sdk" }

# Local crates
fabrication_common = { path = "crates/fabrication_common" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
