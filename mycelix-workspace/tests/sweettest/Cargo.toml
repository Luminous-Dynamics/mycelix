[package]
name = "mycelix-sweettest"
version = "0.1.0"
edition = "2021"
publish = false
description = "Sweettest integration tests for Mycelix ecosystem hApps"
autotests = false

# Note: These tests require:
# 1. WASM zomes built: cargo build --release --target wasm32-unknown-unknown
# 2. DNA bundles packed: hc dna pack <dna-dir>
# 3. hApp bundles packed: hc app pack <happ-dir>
# Tests are #[ignore] by default - run with: cargo test -- --ignored

[dev-dependencies]
# Holochain sweettest framework
holochain = { version = "0.6", features = ["test_utils"] }

# Async runtime
tokio = { version = "1", features = ["full", "test-util"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rmp-serde = "1.3"

# Prevent nonce expiration from parallel test resource contention
serial_test = "3"

# PQC crypto for constructing test data off-chain
mycelix-crypto = { path = "../../../mycelix-identity/crates/mycelix-crypto", features = ["native"] }

# Needed for SerializedBytes derive macro (proc macro references crate by name)
holochain_serialized_bytes = "0.0.56"

# Bridge types for pure-Rust integration tests (no conductor needed)
mycelix-bridge-common = { path = "../../../crates/mycelix-bridge-common" }
mycelix-bridge-entry-types = { path = "../../../crates/mycelix-bridge-entry-types" }

[[test]]
name = "identity_workflow"
path = "tests/identity_workflow.rs"

