---
# Unified hApp for cross-cluster sweettest integration tests
#
# Installs both commons and civic DNAs so that OtherRole dispatch works.
# Used by: tests/cross_cluster_dispatch.rs

manifest_version: "0"
name: mycelix-unified
description: |
  Test-only hApp that bundles both commons and civic DNAs to exercise
  cross-cluster dispatch (CallTargetCell::OtherRole).

roles:
  - name: commons
    provisioning:
      strategy: create
      deferred: false
    dna:
      path: ../../../mycelix-commons/dna/mycelix_commons.dna
      modifiers:
        network_seed: ~
        properties: ~
      clone_limit: 0

  - name: civic
    provisioning:
      strategy: create
      deferred: false
    dna:
      path: ../../../mycelix-civic/dna/mycelix_civic.dna
      modifiers:
        network_seed: ~
        properties: ~
      clone_limit: 0
