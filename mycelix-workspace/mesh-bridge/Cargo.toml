[package]
name = "mycelix-mesh-bridge"
version = "0.1.0"
edition = "2021"
description = "Offline mesh bridge for Mycelix — relays TEND, food, and emergency entries over LoRa/WiFi-direct when internet is down"

[lib]
name = "mycelix_mesh_bridge"
path = "src/lib.rs"

[[bin]]
name = "mesh-bridge"
path = "src/main.rs"

[dependencies]
# Holochain client for conductor communication
holochain_client = "=0.6.0" # Pin exact — must match conductor version. See nix/modules/holochain-versions.nix
holochain_types = "0.4"     # For ExternIO (not re-exported from client 0.6.0)

# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"
thiserror = "1"

# Hashing for dedup
blake3 = "1"

# PSK encryption (XChaCha20-Poly1305)
chacha20poly1305 = "0.10"
rand = "0.8"
hex = "0.4"

# Time
chrono = "0.4"

# Async trait for transport abstraction
async-trait = "0.1"

# Graceful shutdown
tokio-util = "0.7"

# Hostname for node ID
hostname = "0.4"

# Linux SPI for LoRa (optional, only on RPi)
[target.'cfg(target_os = "linux")'.dependencies]
spidev = { version = "0.6", optional = true }

[dev-dependencies]
proptest = "1"
serde_yaml = "0.9"
tempfile = "3"

[features]
default = []
lora = ["spidev"]
batman = []
meshtastic = ["dep:serialport"]
mqtt = ["dep:rumqttc"]
espnow = ["dep:serialport"]
reticulum = []
ccsds = []

[dependencies.serialport]
version = "4"
optional = true

[dependencies.rumqttc]
version = "0.24"
optional = true
