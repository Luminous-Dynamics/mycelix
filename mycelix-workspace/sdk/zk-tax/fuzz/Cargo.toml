[package]
name = "zk-tax-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1.3", features = ["derive"] }
serde_json = "1.0"

[dependencies.mycelix-zk-tax]
path = ".."
features = ["std"]

[[bin]]
name = "fuzz_bracket_lookup"
path = "fuzz_targets/fuzz_bracket_lookup.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_proof_serialization"
path = "fuzz_targets/fuzz_proof_serialization.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_jurisdiction_parsing"
path = "fuzz_targets/fuzz_jurisdiction_parsing.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_commitment"
path = "fuzz_targets/fuzz_commitment.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_compression"
path = "fuzz_targets/fuzz_compression.rs"
test = false
doc = false
bench = false
