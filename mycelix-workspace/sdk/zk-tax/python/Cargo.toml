[package]
name = "zk-tax-python"
version = "0.1.0"
edition = "2021"
description = "Python bindings for ZK Tax SDK"
license = "AGPL-3.0-or-later"

[lib]
name = "zk_tax"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module"] }
serde_json = "1.0"

[dependencies.mycelix-zk-tax]
path = ".."
features = ["std"]

[build-dependencies]
pyo3-build-config = "0.22"
