[package]
name = "sweettest-harness"
version = "0.1.0"
edition = "2021"
description = "Shared conductor pool for memory-efficient Mycelix sweettests"
publish = false

[dependencies]
holochain = { workspace = true }
hdk = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
