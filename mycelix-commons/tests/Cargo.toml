[package]
name = "commons-tests"
version = "0.1.0"
edition = "2021"
description = "Integration tests for mycelix-commons cluster hApp"
publish = false
autotests = false

[lib]
path = "lib.rs"

[dependencies]
holochain = { version = "0.6", features = ["test_utils", "sweettest"] }
holochain_types = "0.6"
hdk = "0.6"
hdi = "0.7"
tokio = { version = "1", features = ["full", "test-util"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"

[[test]]
name = "sweettest_integration"
path = "sweettest_integration.rs"

[[test]]
name = "sweettest_property_bridge"
path = "sweettest_property_bridge.rs"

[[test]]
name = "sweettest_food_transport"
path = "sweettest_food_transport.rs"

[[test]]
name = "sweettest_dispatch_support"
path = "sweettest_dispatch_support.rs"

[[test]]
name = "cross_domain_sweettest"
path = "cross_domain_sweettest.rs"

[[test]]
name = "sweettest_consciousness_gating"
path = "sweettest_consciousness_gating.rs"

[[test]]
name = "sweettest_security_hardening"
path = "sweettest_security_hardening.rs"

[[test]]
name = "sweettest_circular_economy"
path = "sweettest_circular_economy.rs"

[features]
identity_cluster = []
civic_cluster = []
