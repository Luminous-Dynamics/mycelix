[package]
name = "mycelix-commons-ui"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Leptos CSR frontend for Mycelix Commons — community resource coordination"

[workspace]

[dependencies]
leptos = { version = "0.8", features = ["csr"] }
leptos_router = "0.8"
leptos_meta = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "console", "HtmlInputElement", "HtmlElement",
    "Event", "EventTarget", "CssStyleDeclaration",
    "Window", "Storage", "Document",
] }
console_error_panic_hook = "0.1"
gloo-timers = "0.3"

# Shared Mycelix Leptos infrastructure
mycelix-leptos-core = { path = "../../../crates/mycelix-leptos-core" }

# Cluster types
commons-leptos-types = { path = "../../crates/commons-leptos-types" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
