[package]
name = "music_bridge"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"

[lib]
crate-type = ["cdylib", "rlib"]
name = "music_bridge"

[dependencies]
hdk = "0.6"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
holochain_serialized_bytes = "0.0.56"
music_bridge_integrity = { path = "../integrity" }
mycelix-bridge-common = { path = "../../../../../../crates/mycelix-bridge-common" }

[profile.release]
opt-level = 'z'
lto = true
