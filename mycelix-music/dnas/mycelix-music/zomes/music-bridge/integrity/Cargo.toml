[package]
name = "music_bridge_integrity"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"

[lib]
crate-type = ["cdylib", "rlib"]
name = "music_bridge_integrity"

[dependencies]
hdi = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
holochain_serialized_bytes = "0.0.56"
mycelix-bridge-entry-types = { path = "../../../../../../crates/mycelix-bridge-entry-types" }

[profile.release]
opt-level = 'z'
lto = true
