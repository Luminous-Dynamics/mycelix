[package]
name = "catalog_integrity"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]
name = "catalog_integrity"

[dependencies]
hdi = "0.7"
serde = { version = "1.0", features = ["derive"] }
holochain_serialized_bytes = "0.0.56"
getrandom = { version = "0.3" }

[profile.release]
opt-level = 'z'
lto = true
