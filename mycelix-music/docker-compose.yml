version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mycelix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: mycelix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs_data:/data/ipfs

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mycelix:${POSTGRES_PASSWORD}@postgres:5432/mycelix
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://mycelix:${POSTGRES_PASSWORD}@postgres:5432/mycelix
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  realtime:
    build:
      context: .
      dockerfile: docker/realtime/Dockerfile
    ports:
      - "4001:4001"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  audio-intelligence:
    build:
      context: .
      dockerfile: docker/audio-intelligence/Dockerfile
    ports:
      - "4002:4002"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  discovery:
    build:
      context: .
      dockerfile: docker/discovery/Dockerfile
    ports:
      - "4003:4003"
    environment:
      DATABASE_URL: postgresql://mycelix:${POSTGRES_PASSWORD}@postgres:5432/mycelix
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  live:
    build:
      context: .
      dockerfile: docker/live/Dockerfile
    ports:
      - "4004:4004"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  broadcast:
    build:
      context: .
      dockerfile: docker/broadcast/Dockerfile
    ports:
      - "4005:4005"
      - "4006:4006/udp"  # WebRTC media
    environment:
      REDIS_URL: redis://redis:6379
      TURN_SERVER: turn:turn.mycelix.local:3478
    depends_on:
      - redis

  stem-separation:
    build:
      context: .
      dockerfile: docker/stem-separation/Dockerfile
    ports:
      - "4007:4007"
    environment:
      REDIS_URL: redis://redis:6379
      MODEL_PATH: /models
    volumes:
      - ml_models:/models
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  hardhat:
    build:
      context: .
      dockerfile: docker/hardhat/Dockerfile
    ports:
      - "8545:8545"
    command: npx hardhat node --hostname 0.0.0.0

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  ipfs_data:
  ml_models:
