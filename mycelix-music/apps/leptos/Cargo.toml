[package]
name = "mycelix-music-ui"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Leptos CSR frontend for Mycelix Music — zero-cost streaming with Holochain"

[dependencies]
leptos = { version = "0.8", features = ["csr"] }
leptos_router = "0.8"
leptos_meta = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "console", "HtmlAudioElement", "HtmlInputElement",
    "HtmlCanvasElement", "CanvasRenderingContext2d",
    "HtmlMediaElement", "HtmlElement", "MediaError",
    "Event", "EventTarget", "CssStyleDeclaration",
    "Window", "Storage", "Document", "Performance",
    # WebGL2 consciousness visualization
    "WebGl2RenderingContext", "WebGlProgram", "WebGlShader",
    "WebGlBuffer", "WebGlUniformLocation", "WebGlVertexArrayObject",
    # Web Audio API for synthesis + spectral analysis
    "AudioContext", "AnalyserNode", "GainNode",
    "MediaElementAudioSourceNode", "AudioNode", "AudioDestinationNode",
    "BaseAudioContext", "AudioBuffer", "AudioBufferSourceNode",
    "AudioScheduledSourceNode",
    # Blob/URL for WAV export download
    "Blob", "BlobPropertyBag", "Url",
    # WebSocket for Holochain signal reception
    "WebSocket", "MessageEvent", "CloseEvent", "ErrorEvent",
] }
console_error_panic_hook = "0.1"
gloo-timers = { version = "0.3", features = ["futures"] }

# Real consciousness-driven synthesis engine
symthaea-muse = { path = "../../../symthaea/crates/symthaea-muse", default-features = false }
getrandom = { version = "0.2", features = ["js"] }
uuid = { version = "1", features = ["js"] }

# Shared Mycelix Leptos infrastructure
mycelix-leptos-core = { path = "../../../crates/mycelix-leptos-core" }
mycelix-leptos-client = { path = "../../../crates/mycelix-leptos-client" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
