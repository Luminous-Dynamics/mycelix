# Prometheus Alert Rules for Mycelix Music Platform
groups:
  # ============================================================================
  # Service Health Alerts
  # ============================================================================
  - name: service-health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
          /
          sum(rate(http_requests_total[5m])) by (service)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.service }}"

      - alert: CriticalErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
          /
          sum(rate(http_requests_total[5m])) by (service)
          > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.service }}"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))
          > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.service }}"
          description: "95th percentile latency is {{ $value }}s on {{ $labels.service }}"

  # ============================================================================
  # Streaming Service Alerts
  # ============================================================================
  - name: streaming
    rules:
      - alert: StreamingBufferOverflow
        expr: streaming_buffer_usage_ratio > 0.9
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Streaming buffer near capacity"
          description: "Streaming buffer is at {{ $value | humanizePercentage }} capacity"

      - alert: HighStreamingLatency
        expr: streaming_segment_delivery_latency_seconds > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High streaming latency detected"
          description: "Segment delivery latency is {{ $value }}s"

      - alert: ConcurrentStreamsHigh
        expr: streaming_active_streams > 10000
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "High number of concurrent streams"
          description: "{{ $value }} active streams"

  # ============================================================================
  # Database Alerts
  # ============================================================================
  - name: database
    rules:
      - alert: PostgresConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections high"
          description: "{{ $value }} active connections (warning threshold: 80)"

      - alert: PostgresReplicationLag
        expr: pg_replication_lag_seconds > 30
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL replication lag critical"
          description: "Replication lag is {{ $value }}s"

      - alert: PostgresDiskSpaceLow
        expr: |
          pg_database_size_bytes / pg_settings_max_size_bytes > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL disk space running low"
          description: "Database using {{ $value | humanizePercentage }} of available space"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis using {{ $value | humanizePercentage }} of max memory"

      - alert: RedisConnectionsHigh
        expr: redis_connected_clients > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis connections high"
          description: "{{ $value }} connected clients"

  # ============================================================================
  # Kubernetes Alerts
  # ============================================================================
  - name: kubernetes
    rules:
      - alert: PodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} has restarted {{ $value }} times in 15m"

      - alert: PodNotReady
        expr: |
          sum by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown"}) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} not ready"
          description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} has been not ready for 10m"

      - alert: DeploymentReplicasMismatch
        expr: |
          kube_deployment_spec_replicas != kube_deployment_status_replicas_available
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Deployment {{ $labels.deployment }} replicas mismatch"
          description: "Expected {{ $value }} replicas but have {{ $value }}"

      - alert: NodeMemoryPressure
        expr: |
          kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node }} under memory pressure"

      - alert: NodeDiskPressure
        expr: |
          kube_node_status_condition{condition="DiskPressure",status="true"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node }} under disk pressure"

  # ============================================================================
  # Business Metrics Alerts
  # ============================================================================
  - name: business
    rules:
      - alert: LowSignupRate
        expr: |
          sum(rate(user_signups_total[1h])) < 10
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "Low signup rate"
          description: "Only {{ $value }} signups in the last hour"

      - alert: PaymentFailureRateHigh
        expr: |
          sum(rate(payment_failures_total[1h]))
          /
          sum(rate(payment_attempts_total[1h]))
          > 0.1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High payment failure rate"
          description: "{{ $value | humanizePercentage }} of payments failing"

      - alert: LiveStreamViewersDrop
        expr: |
          delta(live_stream_viewers_total[5m]) < -100
        for: 2m
        labels:
          severity: info
        annotations:
          summary: "Sudden drop in live stream viewers"
          description: "Lost {{ $value }} viewers in 5 minutes"

  # ============================================================================
  # Security Alerts
  # ============================================================================
  - name: security
    rules:
      - alert: HighFailedLoginAttempts
        expr: |
          sum(rate(auth_login_failures_total[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate of failed login attempts"
          description: "{{ $value }} failed logins per second"

      - alert: SuspiciousRateLimiting
        expr: |
          sum(rate(rate_limit_exceeded_total[5m])) by (ip) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Suspicious rate limiting from IP"
          description: "IP {{ $labels.ip }} exceeding rate limits"

      - alert: CertificateExpiringSoon
        expr: |
          (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate expiring soon"
          description: "Certificate expires in {{ $value }} days"
