version: '3.9'

services:
  # ==========================================================================
  # Core Services
  # ==========================================================================

  api-gateway:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://mycelix:${DB_PASSWORD}@postgres:5432/mycelix
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - IPFS_URL=http://ipfs:5001
    depends_on:
      - postgres
      - redis
      - ipfs
    networks:
      - mycelix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streaming-service:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.streaming
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - CDN_URL=${CDN_URL}
    depends_on:
      - redis
    networks:
      - mycelix-network
    restart: unless-stopped

  discovery-engine:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.discovery
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://mycelix:${DB_PASSWORD}@postgres:5432/mycelix
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - postgres
      - redis
      - elasticsearch
    networks:
      - mycelix-network
    restart: unless-stopped

  social-service:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.social
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://mycelix:${DB_PASSWORD}@postgres:5432/mycelix
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - mycelix-network
    restart: unless-stopped

  analytics-service:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.analytics
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://mycelix:${DB_PASSWORD}@postgres:5432/mycelix
      - CLICKHOUSE_URL=http://clickhouse:8123
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - clickhouse
      - redis
    networks:
      - mycelix-network
    restart: unless-stopped

  ai-audio-service:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.ai-audio
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - GPU_ENABLED=true
      - MODEL_PATH=/models
    volumes:
      - ai-models:/models
      - audio-processing:/tmp/audio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - mycelix-network
    restart: unless-stopped

  live-service:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.live
    ports:
      - "3006:3006"
      - "8443:8443" # WebRTC
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - RTMP_URL=rtmp://media-server:1935
    depends_on:
      - redis
      - media-server
    networks:
      - mycelix-network
    restart: unless-stopped

  notification-service:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.notifications
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://mycelix:${DB_PASSWORD}@postgres:5432/mycelix
      - REDIS_URL=redis://redis:6379
      - FCM_PROJECT_ID=${FCM_PROJECT_ID}
      - FCM_PRIVATE_KEY=${FCM_PRIVATE_KEY}
      - APNS_KEY_ID=${APNS_KEY_ID}
      - APNS_TEAM_ID=${APNS_TEAM_ID}
    depends_on:
      - postgres
      - redis
    networks:
      - mycelix-network
    restart: unless-stopped

  # ==========================================================================
  # Frontend
  # ==========================================================================

  web-app:
    build:
      context: ../../frontend/web
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:3000
      - NEXT_PUBLIC_STREAMING_URL=http://streaming-service:3001
      - NEXT_PUBLIC_WS_URL=ws://api-gateway:3000
    depends_on:
      - api-gateway
    networks:
      - mycelix-network
    restart: unless-stopped

  admin-dashboard:
    build:
      context: ../../frontend/admin
      dockerfile: Dockerfile
    ports:
      - "3080:80"
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:3000
    depends_on:
      - api-gateway
    networks:
      - mycelix-network
    restart: unless-stopped

  # ==========================================================================
  # Databases
  # ==========================================================================

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=mycelix
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=mycelix
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mycelix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycelix"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - mycelix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - mycelix-network
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - mycelix-network
    restart: unless-stopped

  # ==========================================================================
  # Media & Storage
  # ==========================================================================

  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001" # P2P
      - "5001:5001" # API
      - "8080:8080" # Gateway
    volumes:
      - ipfs-data:/data/ipfs
    networks:
      - mycelix-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9001:9000"
      - "9002:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - mycelix-network
    restart: unless-stopped

  media-server:
    image: tiangolo/nginx-rtmp:latest
    ports:
      - "1935:1935" # RTMP
      - "8088:80"   # HLS
    volumes:
      - ./nginx-rtmp.conf:/etc/nginx/nginx.conf
      - media-hls:/tmp/hls
    networks:
      - mycelix-network
    restart: unless-stopped

  # ==========================================================================
  # Message Queue
  # ==========================================================================

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - mycelix-network
    restart: unless-stopped

  # ==========================================================================
  # Monitoring
  # ==========================================================================

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - mycelix-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - mycelix-network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # UI
      - "14268:14268" # Collector
      - "6831:6831/udp" # Agent
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - mycelix-network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    ports:
      - "3101:3100"
    volumes:
      - loki-data:/loki
      - ./loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - mycelix-network
    restart: unless-stopped

# ==========================================================================
# Networks & Volumes
# ==========================================================================

networks:
  mycelix-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  elasticsearch-data:
  clickhouse-data:
  ipfs-data:
  minio-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
  loki-data:
  ai-models:
  audio-processing:
  media-hls:
