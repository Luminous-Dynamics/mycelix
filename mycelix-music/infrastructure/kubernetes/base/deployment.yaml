          env:
            - name: WORKER_TYPE
              value: "streaming"
          envFrom:
            - secretRef:
                name: mycelix-secrets
            - configMapRef:
                name: mycelix-config
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
