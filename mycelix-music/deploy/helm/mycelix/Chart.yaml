# =============================================================================
# Mycelix Music Platform - Helm Chart
# =============================================================================
apiVersion: v2
name: mycelix
description: A Helm chart for the Mycelix Music Platform

type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - music
  - streaming
  - platform
  - api

home: https://mycelix.music
sources:
  - https://github.com/mycelix/mycelix-music

maintainers:
  - name: Mycelix Team
    email: team@mycelix.music

dependencies:
  - name: postgresql
    version: "13.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  - name: redis
    version: "18.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

  - name: elasticsearch
    version: "19.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: elasticsearch.enabled

  - name: kafka
    version: "26.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled

annotations:
  artifacthub.io/license: MIT
  artifacthub.io/category: streaming
