{{- if .Values.api.enabled }}
# =============================================================================
# API Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mycelix.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mycelix.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      {{- include "mycelix.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "mycelix.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- if .Values.monitoring.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        {{- end }}
    spec:
      serviceAccountName: {{ include "mycelix.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.security.podSecurityContext | nindent 8 }}

      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}

      # Pod anti-affinity for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "mycelix.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: api
                topologyKey: kubernetes.io/hostname
        {{- with .Values.api.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "mycelix.databaseHost" . }} {{ include "mycelix.databasePort" . }}; do
                echo "Waiting for database..."
                sleep 2
              done
              echo "Database is ready"

        - name: run-migrations
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: {{ include "mycelix.fullname" . }}-config
            - secretRef:
                name: {{ include "mycelix.fullname" . }}-secrets

      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.api.service.targetPort }}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          envFrom:
            - configMapRef:
                name: {{ include "mycelix.fullname" . }}-config
            - secretRef:
                name: {{ include "mycelix.fullname" . }}-secrets

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}

          securityContext:
            {{- toYaml .Values.security.containerSecurityContext | nindent 12 }}

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache

          {{- with .Values.api.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.api.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.api.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 10

      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}

      terminationGracePeriodSeconds: 30
{{- end }}

---
{{- if .Values.worker.enabled }}
# =============================================================================
# Worker Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mycelix.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mycelix.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "mycelix.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "mycelix.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "mycelix.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.security.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command:
            {{- toYaml .Values.worker.command | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "mycelix.fullname" . }}-config
            - secretRef:
                name: {{ include "mycelix.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.security.containerSecurityContext | nindent 12 }}
{{- end }}

---
{{- if .Values.transcoder.enabled }}
# =============================================================================
# Transcoder Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mycelix.fullname" . }}-transcoder
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mycelix.labels" . | nindent 4 }}
    app.kubernetes.io/component: transcoder
spec:
  replicas: {{ .Values.transcoder.replicaCount }}
  selector:
    matchLabels:
      {{- include "mycelix.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: transcoder
  template:
    metadata:
      labels:
        {{- include "mycelix.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: transcoder
    spec:
      serviceAccountName: {{ include "mycelix.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.security.podSecurityContext | nindent 8 }}
      containers:
        - name: transcoder
          image: "{{ .Values.transcoder.image.repository }}:{{ .Values.transcoder.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.transcoder.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "mycelix.fullname" . }}-config
            - secretRef:
                name: {{ include "mycelix.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.transcoder.resources | nindent 12 }}
          volumeMounts:
            - name: transcode-storage
              mountPath: /tmp/transcode
      volumes:
        - name: transcode-storage
          {{- if .Values.transcoder.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "mycelix.fullname" . }}-transcoder
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
