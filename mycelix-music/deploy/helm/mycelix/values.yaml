# =============================================================================
# Mycelix Music Platform - Helm Values
#
# Default configuration values for the Mycelix Music Platform
# =============================================================================

# Global settings
global:
  environment: production
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# =============================================================================
# API Service
# =============================================================================
api:
  enabled: true
  name: api

  image:
    repository: mycelix/api
    tag: latest
    pullPolicy: Always

  replicaCount: 3

  # Resource limits
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Autoscaling
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 50
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
    annotations: {}

  # Ingress configuration
  ingress:
    enabled: true
    className: nginx
    annotations:
      kubernetes.io/tls-acme: "true"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
      nginx.ingress.kubernetes.io/rate-limit: "100"
      nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    hosts:
      - host: api.mycelix.music
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: mycelix-api-tls
        hosts:
          - api.mycelix.music

  # Health checks
  livenessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /api/health/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30

  # Pod disruption budget
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  # Node selector and tolerations
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Environment variables
  env:
    NODE_ENV: production
    LOG_LEVEL: info
    LOG_FORMAT: json
    METRICS_ENABLED: "true"
    TRACING_ENABLED: "true"
    TRACING_SAMPLING_RATE: "0.1"

  # Secrets (should be overridden in production)
  secrets:
    jwtSecret: ""  # Required: Override in production
    databasePassword: ""
    redisPassword: ""

# =============================================================================
# Worker Service
# =============================================================================
worker:
  enabled: true
  name: worker

  image:
    repository: mycelix/api
    tag: latest
    pullPolicy: Always

  command: ["npm", "run", "worker"]

  replicaCount: 2

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 80

# =============================================================================
# Transcoder Service
# =============================================================================
transcoder:
  enabled: true
  name: transcoder

  image:
    repository: mycelix/transcoder
    tag: latest
    pullPolicy: Always

  replicaCount: 2

  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 4Gi

  # Volume for temporary files
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
    accessMode: ReadWriteOnce

# =============================================================================
# PostgreSQL
# =============================================================================
postgresql:
  enabled: true
  auth:
    username: mycelix
    password: ""  # Set in production
    database: mycelix
  primary:
    persistence:
      enabled: true
      size: 100Gi
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  readReplicas:
    replicaCount: 2
    persistence:
      enabled: true
      size: 100Gi
  metrics:
    enabled: true

# =============================================================================
# Redis
# =============================================================================
redis:
  enabled: true
  auth:
    enabled: true
    password: ""  # Set in production
  master:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  replica:
    replicaCount: 2
    persistence:
      enabled: true
      size: 10Gi
  sentinel:
    enabled: true
  metrics:
    enabled: true

# =============================================================================
# Elasticsearch
# =============================================================================
elasticsearch:
  enabled: true
  master:
    replicaCount: 3
    persistence:
      enabled: true
      size: 50Gi
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  data:
    replicaCount: 3
    persistence:
      enabled: true
      size: 200Gi
  metrics:
    enabled: true

# =============================================================================
# Kafka
# =============================================================================
kafka:
  enabled: true
  replicaCount: 3
  persistence:
    enabled: true
    size: 100Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  zookeeper:
    enabled: true
    replicaCount: 3
    persistence:
      enabled: true
      size: 10Gi
  metrics:
    kafka:
      enabled: true
    jmx:
      enabled: true

# =============================================================================
# Object Storage (S3 compatible)
# =============================================================================
objectStorage:
  # Use external S3 or MinIO
  provider: s3  # s3, gcs, azure, minio
  bucket: mycelix-media
  region: us-east-1
  endpoint: ""  # Leave empty for AWS S3
  accessKeyId: ""
  secretAccessKey: ""
  cdnUrl: ""

# =============================================================================
# Monitoring & Observability
# =============================================================================
monitoring:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s

  grafana:
    enabled: true
    adminPassword: ""  # Set in production
    dashboards:
      enabled: true

  jaeger:
    enabled: true
    collector:
      enabled: true
    agent:
      enabled: true
    query:
      enabled: true

# =============================================================================
# Security
# =============================================================================
security:
  # Pod security
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # Network policies
  networkPolicies:
    enabled: true

  # Service mesh (Istio)
  istio:
    enabled: false
    mtls:
      mode: STRICT

# =============================================================================
# Feature Flags
# =============================================================================
featureFlags:
  provider: local  # local, launchdarkly, unleash
  apiKey: ""
  refreshInterval: 30000
  defaults:
    newRecommendationEngine: false
    spatialAudio: false
    liveStreaming: true

# =============================================================================
# Multi-tenancy
# =============================================================================
multiTenancy:
  enabled: false
  isolationLevel: row  # row, schema, database
  defaultTenant: default
