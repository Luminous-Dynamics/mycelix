apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mycelix.fullname" . }}-secrets
  labels:
    {{- include "mycelix.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "mycelix.databaseUrl" . | quote }}
  redis-url: {{ include "mycelix.redisUrl" . | quote }}
  {{- if .Values.api.secrets.apiAdminKey }}
  api-admin-key: {{ .Values.api.secrets.apiAdminKey | quote }}
  {{- end }}
  {{- if .Values.api.secrets.ceramicAdminSeed }}
  ceramic-admin-seed: {{ .Values.api.secrets.ceramicAdminSeed | quote }}
  {{- end }}
