[package]
name = "music-tests"
version = "0.1.0"
edition = "2021"
description = "Integration tests for mycelix-music cluster hApp"
publish = false
autotests = false

[lib]
path = "lib.rs"

[dependencies]
holochain = { version = "0.6", features = ["test_utils", "sweettest"] }
holochain_types = "0.6"
hdk = "0.6"
hdi = "0.7"
tokio = { version = "1", features = ["full", "test-util"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"

[[test]]
name = "sweettest_integration"
path = "sweettest_integration.rs"

# Validation tests — zero dependencies, compiles instantly
[[test]]
name = "validation_tests"
path = "validation_tests.rs"
