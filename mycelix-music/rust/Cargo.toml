[workspace]
resolver = "2"
members = [
    "crates/mycelix-audio",
    "crates/mycelix-streaming",
    "crates/mycelix-realtime",
    "crates/mycelix-analysis",
    "crates/mycelix-node",
    "crates/mycelix-wasm",
    # New high-performance crates
    "crates/mycelix-ml",
    "crates/mycelix-codec",
    "crates/mycelix-spatial",
    "crates/mycelix-mir",
    "crates/mycelix-protocol",
    "crates/mycelix-search",
    # Core integration layer
    "crates/mycelix-core",
    # API service layer
    "crates/mycelix-api",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Mycelix Team <team@mycelix.music>"]
license = "AGPL-3.0-or-later"
repository = "https://github.com/mycelix/mycelix-music"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Audio processing
symphonia = { version = "0.5", features = ["all"] }
rubato = "0.14"
dasp = "0.11"
hound = "3.5"

# FFmpeg bindings (for transcoding)
ffmpeg-next = "6.1"

# Streaming
bytes = "1.5"
tokio-stream = "0.1"
async-stream = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Concurrency
crossbeam = "0.8"
parking_lot = "0.12"
rayon = "1.8"

# Cryptography
ring = "0.17"
base64 = "0.21"

# HTTP/WebSocket
axum = { version = "0.7", features = ["ws"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
reqwest = { version = "0.11", features = ["json"] }

# WebRTC
webrtc = "0.9"

# Node.js bindings
napi = { version = "2.14", features = ["async", "serde-json"] }
napi-derive = "2.14"

# WASM
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["AudioContext", "AudioBuffer", "AudioWorkletNode"] }

# Utilities
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
derive_builder = "0.12"
num-traits = "0.2"

# ML Inference
tract-onnx = "0.21"
tract-core = "0.21"
ndarray = "0.15"

# Audio Codecs
ogg = "0.9"
lewton = "0.10"
opus = "0.3"
mp3lame-encoder = "0.1"
minimp3 = "0.5"

# Spatial Audio
nalgebra = "0.32"
realfft = "3.3"

# Network Protocol
quinn = "0.10"
rustls = "0.21"

# Search/Indexing
hnsw = "0.11"
simsimd = "4"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.release-with-debug]
inherits = "release"
debug = true
strip = false
