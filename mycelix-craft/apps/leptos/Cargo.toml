[package]
name = "mycelix-craft-ui"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Leptos CSR frontend for Mycelix Craft — decentralized talent marketplace with living credentials"

[dependencies]
leptos = { version = "0.8", features = ["csr"] }
leptos_router = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console", "HtmlInputElement", "HtmlTextAreaElement", "HtmlSelectElement", "Window", "Storage", "Location", "Document", "Element"] }
console_error_panic_hook = "0.1"
gloo-timers = { version = "0.3", features = ["futures"] }
wasm-bindgen-futures = "0.4"

# Shared Mycelix Leptos components
mycelix-leptos-core = { path = "../../../crates/mycelix-leptos-core" }
mycelix-leptos-client = { path = "../../../crates/mycelix-leptos-client", features = ["browser"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
