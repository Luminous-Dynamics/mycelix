[package]
name = "mycelix-civic-ui"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Leptos CSR frontend for Mycelix Civic — justice, emergency coordination, media commons"

# Standalone crate (not part of parent civic workspace — the zome workspace
# has WASM-specific profile/deps that conflict with native Leptos WASM).
[workspace]

[dependencies]
leptos = { version = "0.8", features = ["csr"] }
leptos_router = "0.8"
leptos_meta = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "console", "HtmlInputElement", "HtmlElement",
    "Event", "EventTarget", "CssStyleDeclaration",
    "Window", "Storage", "Document",
] }
console_error_panic_hook = "0.1"
gloo-timers = "0.3"

# Shared Mycelix Leptos infrastructure — provides StatCard, TelemetryLine,
# GraphNode/Edge, FlowIndicator, SovereignRadar, Indlela, theme framework,
# Showcase reference page, and the HolochainProvider auto-connect stack.
mycelix-leptos-core = { path = "../../../crates/mycelix-leptos-core" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
